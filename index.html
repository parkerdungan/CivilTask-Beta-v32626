:root{

  --scrollbar:#b8ccdf;
  --row-active:rgba(0,0,0,0.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;background:var(--bg0)}
body{font-family:'Barlow',sans-serif;color:var(--text);overscroll-behavior:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
button{-webkit-user-select:none;user-select:none}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet{animation:slideUp 0.28s cubic-bezier(0.32,0.72,0,1)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.2s ease}
@keyframes expandDown{from{opacity:0;transform:scaleY(0.96);transform-origin:top}to{opacity:1;transform:scaleY(1)}}
.expand{animation:expandDown 0.16s ease}
input,select,textarea{background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;padding:11px 14px;color:var(--input-text);font-size:15px;font-family:'Barlow',sans-serif;width:100%;outline:none;-webkit-appearance:none;appearance:none}
input::placeholder,textarea::placeholder{color:var(--input-ph)}
.tap:active{opacity:0.65;transform:scale(0.97);transition:all 0.1s}
.rt:active{background:var(--row-active)!important}
</style>

// val comes back as object when array stored - convert
function fromFB(val){
  if(!val)return null;
  if(Array.isArray(val))return val;
  if(typeof val==='object'){
    const keys=Object.keys(val);
    if(keys.every(k=>!isNaN(parseInt(k))))return Object.values(val);
  }
  return val;
}
window.fbGet=(path)=>window.DB.ref(path).get().then(s=>fromFB(s.val()));
window.fbSet=(path,val)=>window.DB.ref(path).set(val);
window.fbOn=(path,cb)=>{const ref=window.DB.ref(path);ref.on('value',s=>cb(fromFB(s.val())));return()=>ref.off();};

const uid=()=>Math.random().toString(36).slice(2,9);
const fmtDate=(d)=>d?new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"—";
const fmtShort=(d)=>d?new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"";
const fmtBytes=(b)=>b<1024?b+" B":b<1048576?(b/1024).toFixed(1)+" KB":(b/1048576).toFixed(1)+" MB";
const fileEmoji=(t)=>!t?"📎":t.includes("pdf")?"📄":t.includes("image")?"🖼":t.includes("sheet")||t.includes("excel")?"📊":t.includes("word")?"📝":"📎";
const mkInitials=(n)=>n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const isOverdue=(task)=>task.dueDate&&new Date(task.dueDate)<new Date()&&task.status!=="done";
const taskTimeGroup=(task)=>{
  if(!task.dueDate)return"later";
  const now=new Date();now.setHours(0,0,0,0);
  const d=new Date(task.dueDate);d.setHours(0,0,0,0);
  const diff=Math.round((d-now)/(1000*60*60*24));
  if(diff<0)return"overdue";if(diff===0)return"today";if(diff===1)return"tomorrow";if(diff<=7)return"thisweek";return"later";
};
const nextProjNum=()=>{
  const now=new Date();
  const yy=String(now.getFullYear()).slice(2);
  const mm=String(now.getMonth()+1).padStart(2,"0");
  return yy+mm+String(Math.floor(1000+Math.random()*8999));
};

function ProjNum({num}){return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 7px",borderRadius:5,fontSize:10,fontWeight:700,color:"#7a9db5",background:C.bgTrack,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,border:"1px solid #1e3248",whiteSpace:"nowrap",flexShrink:0}}>{num}</span>;}
function Av({initials:ini,color,size}){const sz=size||28,col=color||C.gold;return <div style={{width:sz,height:sz,borderRadius:"50%",background:col+"22",border:"1.5px solid "+col+"66",display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz>30?12:10,fontWeight:700,color:col,flexShrink:0,fontFamily:"'Barlow Condensed',sans-serif"}}>{ini}</div>;}
function Sheet({title,onClose,children}){return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",zIndex:200,display:"flex",flexDirection:"column",justifyContent:"flex-end"}} onClick={e=>e.target===e.currentTarget&&onClose()}><div className="sheet" style={{background:C.bg2,borderRadius:"20px 20px 0 0",border:"1px solid "+C.border,borderBottom:"none",maxHeight:"92vh",display:"flex",flexDirection:"column",paddingBottom:"env(safe-area-inset-bottom)"}}><div style={{display:"flex",justifyContent:"center",padding:"10px 0 4px"}}><div style={{width:36,height:4,borderRadius:2,background:C.border}}/></div><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 20px 12px"}}><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:18,letterSpacing:0.5,color:C.heading}}>{title}</span><button className="tap" onClick={onClose} style={{background:C.bgInput,border:"none",borderRadius:20,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,cursor:"pointer"}}><Icon name="x" size={16}/></button></div><div style={{overflowY:"auto",padding:"0 20px 20px"}}>{children}</div></div></div>);}
function Confirm({message,onYes,onNo}){return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:300,display:"flex",alignItems:"flex-end"}}><div className="sheet" style={{background:C.bg2,borderRadius:"16px 16px 0 0",border:"1px solid "+C.border,width:"100%",padding:"20px 20px calc(20px + env(safe-area-inset-bottom))"}}><div style={{fontSize:15,color:C.text,marginBottom:20,textAlign:"center",lineHeight:1.5}}>{message}</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><button className="tap" onClick={onNo} style={{padding:"14px",background:C.bgInput,border:"1px solid "+C.border,borderRadius:12,color:C.muted,fontSize:15,fontFamily:"'Barlow',sans-serif",fontWeight:600,cursor:"pointer"}}>Cancel</button><button className="tap" onClick={onYes} style={{padding:"14px",background:"rgba(224,90,78,0.2)",border:"1px solid rgba(224,90,78,0.4)",borderRadius:12,color:C.red,fontSize:15,fontFamily:"'Barlow',sans-serif",fontWeight:600,cursor:"pointer"}}>Delete</button></div></div></div>);}
function Btn({onClick,children,disabled,full,danger,ghost}){return <button className="tap" onClick={onClick} disabled={disabled} style={{padding:"13px 20px",borderRadius:12,border:ghost?"1px solid "+C.border:"none",cursor:disabled?"not-allowed":"pointer",fontSize:15,fontWeight:600,fontFamily:"'Barlow',sans-serif",background:disabled?"#1a2a3a":danger?"rgba(224,90,78,0.2)":ghost?"transparent":C.gold,color:disabled?C.muted:danger?C.red:ghost?C.muted:C.bg0,width:full?"100%":"auto",opacity:disabled?0.6:1}}>{children}</button>;}
function FF({label,children}){return <div style={{display:"flex",flexDirection:"column",gap:8}}><label style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.muted,fontFamily:"'Barlow Condensed',sans-serif"}}>{label}</label>{children}</div>;}
function PriPicker({value,onChange}){return <div style={{display:"flex",gap:8}}>{[["low","Low","▽"],["medium","Normal","—"],["high","High","▲"]].map(([k,lbl,ic])=><button key={k} className="tap" onClick={()=>onChange(k)} style={{flex:1,padding:"10px 6px",borderRadius:10,border:"1.5px solid "+(value===k?PC[k].color:C.border),background:value===k?PC[k].color+"18":"transparent",color:value===k?PC[k].color:C.muted,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:15}}>{ic}</span>{lbl}</button>)}</div>;}
function FlagIcon({priority}){if(priority==="high")return <span style={{color:C.red,fontSize:13}}>🚩</span>;if(priority==="medium")return <span style={{color:"#5580aa",fontSize:13}}>🏳</span>;return <span style={{color:C.dim,fontSize:13,opacity:0.4}}>🏳</span>;}

// ── FILE ATTACHMENTS ──────────────────────────────────────────────────────────
function FileAttachments({taskId}){
  const [files,setFiles]=useState([]);const [busy,setBusy]=useState(false);const ref=useRef(null);
  useEffect(()=>{const s=LS.get(SK.attach(taskId));if(s)setFiles(s);},[taskId]);
  const save=(list)=>LS.set(SK.attach(taskId),list.map(({id,name,size,type,uploadedAt})=>({id,name,size,type,uploadedAt})));
  const upload=async(e)=>{const picked=Array.from(e.target.files);if(!picked.length)return;setBusy(true);for(const f of picked){if(f.size>3*1024*1024){alert(f.name+" > 3 MB");continue;}const url=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});const m={id:uid(),name:f.name,size:f.size,type:f.type,uploadedAt:new Date().toISOString()};LS.set(SK.file(m.id),url);setFiles(prev=>{const next=[...prev,m];save(next);return next;});}setBusy(false);e.target.value="";};
  const dl=(f)=>{const d=LS.get(SK.file(f.id));if(!d){alert("File not found");return;}const a=document.createElement("a");a.href=d;a.download=f.name;a.click();};
  const rm=(id)=>{LS.del(SK.file(id));const next=files.filter(f=>f.id!==id);setFiles(next);save(next);};
  return(<div style={{display:"flex",flexDirection:"column",gap:10}}><button className="tap" onClick={()=>ref.current&&ref.current.click()} disabled={busy} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"13px",border:"2px dashed "+(busy?"#2a5070":C.border2),borderRadius:12,background:"transparent",color:busy?C.muted:C.blue,cursor:"pointer",fontSize:14}}><Icon name="clip" size={17}/>{busy?"Uploading…":"Attach File (max 3 MB)"}</button><input ref={ref} type="file" multiple style={{display:"none"}} onChange={upload}/>{files.map(f=><div key={f.id} style={{display:"flex",alignItems:"center",gap:11,padding:"11px 13px",background:C.bg0,border:"1px solid "+C.border2,borderRadius:10}}><span style={{fontSize:20}}>{fileEmoji(f.type)}</span><div style={{flex:1,minWidth:0}}><div style={{fontSize:13,color:C.text,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div><div style={{fontSize:11,color:C.dim,marginTop:2}}>{fmtBytes(f.size)}</div></div><button className="tap" onClick={()=>dl(f)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",padding:5}}><Icon name="dl" size={17}/></button><button className="tap" onClick={()=>rm(f.id)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",padding:5}}><Icon name="trash" size={16}/></button></div>)}{!files.length&&!busy&&<div style={{textAlign:"center",color:C.dim,fontSize:12}}>No attachments yet</div>}</div>);
}


// ── DUE DATE PICKER — quick presets + calendar ────────────────────────────────
function DueDatePicker({value,onChange}){
  const [open,setOpen]=useState(false);
  const [popPos,setPopPos]=useState({top:0,left:0});
  const [calMonth,setCalMonth]=useState(()=>{
    if(value){const d=new Date(value+"T00:00:00");return new Date(d.getFullYear(),d.getMonth(),1);}
    return new Date(new Date().getFullYear(),new Date().getMonth(),1);
  });
  const ref=React.useRef(null);
  const btnRef=React.useRef(null);
  const today=new Date();today.setHours(0,0,0,0);
  const fmt=(d)=>{const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,"0");const day=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+day;};
  const addDays=(n)=>{const d=new Date(today);d.setDate(d.getDate()+n);return fmt(d);};
  const addMonths=(n)=>{const d=new Date(today);d.setMonth(d.getMonth()+n);return fmt(d);};
  const presets=[{label:"Tomorrow",val:addDays(1)},{label:"1 Week",val:addDays(7)},{label:"1 Month",val:addMonths(1)},{label:"2 Months",val:addMonths(2)}];
  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const DAYS=["Su","Mo","Tu","We","Th","Fr","Sa"];
  const yr=calMonth.getFullYear(),mo=calMonth.getMonth();
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMo=new Date(yr,mo+1,0).getDate();
  const weeks=[];let wk=new Array(firstDay).fill(null);
  for(let d=1;d<=daysInMo;d++){wk.push(d);if(wk.length===7){weeks.push(wk);wk=[];}}
  if(wk.length)weeks.push([...wk,...new Array(7-wk.length).fill(null)]);
  const pick=(ymd)=>{onChange(ymd);setOpen(false);};
  const selD=value?new Date(value+"T00:00:00"):null;
  const isOD=selD&&selD<today;
  const displayVal=selD?selD.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"Set date";

  const openPicker=()=>{
    if(btnRef.current){
      const r=btnRef.current.getBoundingClientRect();
      const popW=280,popH=360;
      let top=r.top-30;
      let left=r.left-popW-160;
      if(left<10)left=r.right+8;
      if(top+popH>window.innerHeight-10)top=window.innerHeight-popH-10;
      if(top<10)top=10;
      setPopPos({top,left});
    }
    setOpen(v=>!v);
  };

  React.useEffect(()=>{
    if(!open)return;
    const h=(e)=>{if(ref.current&&!ref.current.contains(e.target)&&btnRef.current&&!btnRef.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[open]);
  return(
    <div style={{position:"relative",display:"inline-block",width:"100%"}}>
      <button ref={btnRef} className="tap" onClick={openPicker}
        style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:8,
          border:"1px solid "+(isOD?C.red+"88":value?C.gold+"88":C.border),
          background:isOD?C.red+"14":value?C.gold+"14":C.bgInput,
          color:isOD?C.red:value?C.gold:C.muted,cursor:"pointer",fontSize:12,fontWeight:600,
          fontFamily:"'Barlow Condensed',sans-serif",whiteSpace:"nowrap",width:"100%",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:5}}><Icon name="cal" size={13}/><span>{displayVal}</span></div>
        {value&&<span onClick={e=>{e.stopPropagation();onChange("");setOpen(false);}} style={{color:C.dim,fontSize:15,lineHeight:1,cursor:"pointer"}}>×</span>}
      </button>
      {open&&<div ref={ref} style={{position:"fixed",zIndex:9999,background:C.bg1,border:"1px solid "+C.border,borderRadius:14,
          boxShadow:"0 8px 32px rgba(0,0,0,0.4)",padding:14,width:280,top:popPos.top,left:popPos.left}}>
        {/* Presets */}
        <div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap"}}>
          {presets.map(p=>{const active=value===p.val;return(
            <button key={p.label} className="tap" onClick={()=>pick(p.val)}
              style={{flex:1,padding:"7px 4px",borderRadius:8,border:"1px solid "+(active?C.gold+"88":C.border2),
                background:active?C.gold+"18":C.bgInput,color:active?C.gold:C.muted,cursor:"pointer",
                fontSize:11,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",textAlign:"center"}}>
              {p.label}
            </button>);})}
        </div>
        {/* Month nav */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <button className="tap" onClick={()=>setCalMonth(m=>{const d=new Date(m);d.setMonth(d.getMonth()-1);return d;})}
            style={{background:C.bgInput,border:"1px solid "+C.border2,borderRadius:6,color:C.muted,cursor:"pointer",fontSize:16,padding:"2px 10px",lineHeight:1}}>‹</button>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:C.heading}}>{MONTHS[mo]} {yr}</span>
          <button className="tap" onClick={()=>setCalMonth(m=>{const d=new Date(m);d.setMonth(d.getMonth()+1);return d;})}
            style={{background:C.bgInput,border:"1px solid "+C.border2,borderRadius:6,color:C.muted,cursor:"pointer",fontSize:16,padding:"2px 10px",lineHeight:1}}>›</button>
        </div>
        {/* Day headers */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
          {DAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,color:C.dim,fontFamily:"'Barlow Condensed',sans-serif",padding:"2px 0"}}>{d}</div>)}
        </div>
        {/* Calendar grid */}
        {weeks.map((wk,wi)=>(
          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:2}}>
            {wk.map((d,di)=>{
              if(!d)return<div key={di}/>;
              const cellDate=new Date(yr,mo,d);cellDate.setHours(0,0,0,0);
              const ymd=fmt(cellDate);
              const isToday=cellDate.getTime()===today.getTime();
              const isSel=value===ymd;
              const isPast=cellDate<today;
              return(<button key={di} className="tap" onClick={()=>pick(ymd)}
                style={{padding:"6px 0",borderRadius:7,border:"none",
                  background:isSel?C.gold:isToday?C.blue+"33":C.bgInput,
                  color:isSel?C.bg0:isToday?C.blue:isPast?C.dim:C.text,
                  fontWeight:isSel||isToday?700:400,fontSize:12,cursor:"pointer",textAlign:"center"}}>
                {d}
              </button>);
            })}
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:10}}>
          {value&&<button className="tap" onClick={()=>{onChange("");setOpen(false);}}
            style={{flex:1,padding:"7px",borderRadius:8,border:"1px solid "+C.border2,
              background:C.bgInput,color:C.dim,cursor:"pointer",fontSize:11,fontWeight:700,
              fontFamily:"'Barlow Condensed',sans-serif"}}>Clear Date</button>}
          <button className="tap" onClick={()=>setOpen(false)}
            style={{flex:1,padding:"7px",borderRadius:8,border:"1px solid "+C.border2,
              background:C.bgInput,color:C.muted,cursor:"pointer",fontSize:11,fontWeight:700,
              fontFamily:"'Barlow Condensed',sans-serif"}}>Close</button>
        </div>
      </div>}
    </div>
  );
}

// ── TASK SHEET ────────────────────────────────────────────────────────────────
function TaskSheet({task,projectId,members,projects,teams,onSave,onClose}){
  const proj=projects.find(p=>p.id===projectId);
  const poolMembers=React.useMemo(()=>{
    if(proj&&proj.teamId){const tm=members.filter(m=>m.teamId===proj.teamId);if(tm.length)return tm;}
    if(proj&&proj.companyId){const cm=members.filter(m=>m.companyId===proj.companyId);if(cm.length)return cm;}
    return members;
  },[proj,members]);
  const sid=useRef(task?task.id:"tk"+uid());
  const initIds=task?(task.assigneeIds||(task.assigneeId?[task.assigneeId]:[])):[];
  const [form,setForm]=useState(task?{...task,assigneeIds:initIds,subtasks:task.subtasks||[]}:{title:"",description:"",status:"todo",priority:"medium",assigneeIds:[],dueDate:"",subtasks:[]});
  const [ns,setNs]=useState("");
  const [tab,setTab]=useState("details");

  const toggleAssignee=(id)=>setForm(f=>{const ids=f.assigneeIds||[];return{...f,assigneeIds:ids.includes(id)?ids.filter(x=>x!==id):[...ids,id]};});
  const addSub=()=>{if(!ns.trim())return;setForm(f=>({...f,subtasks:[...f.subtasks,{id:"s"+uid(),title:ns.trim(),done:false,assigneeIds:[]}]}));setNs("");};
  const tog=(id)=>setForm(f=>({...f,subtasks:f.subtasks.map(s=>s.id===id?{...s,done:!s.done}:s)}));
  const rem=(id)=>setForm(f=>({...f,subtasks:f.subtasks.filter(s=>s.id!==id)}));
  const toggleSubAssignee=(sid2,mid)=>setForm(f=>({...f,subtasks:f.subtasks.map(s=>s.id===sid2?{...s,assigneeIds:(s.assigneeIds||[]).includes(mid)?(s.assigneeIds||[]).filter(x=>x!==mid):[...(s.assigneeIds||[]),mid]}:s)}));
  const save=()=>{if(!form.title.trim())return;onSave({...form,id:sid.current,projectId:projectId||form.projectId,assigneeId:form.assigneeIds[0]||""});onClose();};

  return(<Sheet title={task?"Edit Task":"New Task"} onClose={onClose}>
    {/* Tab bar */}
    <div style={{display:"flex",borderBottom:"1px solid "+C.border,marginBottom:20,marginTop:-4}}>
      {[["details","Details"],["attach","Files"]].map(([id,lbl])=><button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"10px",background:"none",border:"none",borderBottom:tab===id?"2px solid "+C.gold:"2px solid transparent",color:tab===id?C.gold:C.muted,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,letterSpacing:1,cursor:"pointer",textTransform:"uppercase",marginBottom:-1}}>{lbl}</button>)}
    </div>

    {tab==="details"&&<div style={{display:"flex",flexDirection:"column",gap:18}}>

      {/* 1 — Title */}
      <FF label="Task Title *">
        <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="Task name" style={{fontSize:16,fontWeight:600}}/>
      </FF>

      {/* 2 — Assignees */}
      <FF label="Assignees">
        {poolMembers.length===0
          ?<div style={{fontSize:12,color:C.dim,padding:"4px 0"}}>No members yet — add staff in the Teams tab first.</div>
          :<div style={{display:"flex",flexWrap:"wrap",gap:7,padding:"2px 0"}}>
            {poolMembers.map(m=>{
              const active=(form.assigneeIds||[]).includes(m.id);
              const mt=teams.find(t=>t.id===m.teamId);
              const col=mt?mt.color:C.blue;
              return(<button key={m.id} className="tap" onClick={()=>toggleAssignee(m.id)}
                style={{display:"flex",alignItems:"center",gap:6,padding:"7px 13px",borderRadius:20,
                  border:"1.5px solid "+(active?col:C.border),
                  background:active?col+"22":"transparent",
                  color:active?col:C.muted,
                  cursor:"pointer",fontSize:13,fontWeight:600,transition:"all 0.12s"}}>
                <Av initials={m.avatar} color={col} size={22}/>
                {m.name.split(" ")[0]}
                {active&&<span style={{fontSize:11,color:C.green}}>✓</span>}
              </button>);
            })}
          </div>
        }
      </FF>

      {/* 3 — Status + Due Date */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <FF label="Status">
          <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
            {Object.entries(SC).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </FF>
        <FF label="Due Date">
          <DueDatePicker value={form.dueDate} onChange={v=>setForm(f=>({...f,dueDate:v}))}/>
        </FF>
      </div>

      {/* 4 — Priority */}
      <FF label="Priority">
        <div style={{display:"flex",gap:8}}>
          {[["low","Low","▽",C.muted],["medium","Normal","—",C.blue],["high","High","▲",C.red]].map(([k,lbl,ic,col])=>(
            <button key={k} className="tap" onClick={()=>setForm(f=>({...f,priority:k}))}
              style={{flex:1,padding:"12px 6px",borderRadius:10,
                border:"1.5px solid "+(form.priority===k?col:C.border),
                background:form.priority===k?col+"18":"transparent",
                color:form.priority===k?col:C.muted,
                cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,
                display:"flex",flexDirection:"column",alignItems:"center",gap:4,transition:"all 0.12s"}}>
              <span style={{fontSize:16}}>{ic}</span>
              <span>{lbl}</span>
            </button>
          ))}
        </div>
      </FF>

      {/* 5 — Description */}
      <FF label="Description">
        <textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Details, notes…" style={{minHeight:72,resize:"none"}}/>
      </FF>

      {/* 6 — Subtasks */}
      <FF label="Subtasks">
        {form.subtasks.map(s=>{
          const subIds=s.assigneeIds||[];
          return(<div key={s.id} style={{
            borderRadius:9,
            border:"1px solid "+C.border,
            marginBottom:6,
            overflow:"hidden",
            background:C.bg1,
          }}>
            {/* Subtask row */}
            <div style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px"}}>
              <button onClick={()=>tog(s.id)} style={{
                width:20,height:20,borderRadius:5,
                border:"1.5px solid "+(s.done?C.green:C.border),
                background:s.done?C.green:"transparent",
                cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                flexShrink:0,color:C.bg0}}>
                {s.done&&<Icon name="check" size={12}/>}
              </button>
              <span style={{flex:1,fontSize:13,fontWeight:500,color:s.done?C.muted:C.text,textDecoration:s.done?"line-through":"none"}}>{s.title}</span>
              <div style={{display:"flex",gap:-2}}>
                {subIds.slice(0,3).map(mid=>{const mm=members.find(x=>x.id===mid);const mt=mm?teams.find(t=>t.id===mm.teamId):null;return mm?<Av key={mid} initials={mm.avatar} color={mt?mt.color:C.blue} size={18}/>:null;})}
              </div>
              <button onClick={()=>rem(s.id)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",padding:2,flexShrink:0}}><Icon name="x" size={15}/></button>
            </div>
            {/* Subtask assignee chips */}
            {poolMembers.length>0&&<div style={{padding:"4px 12px 8px 41px",display:"flex",flexWrap:"wrap",gap:5,borderTop:"1px solid "+C.border2}}>
              {poolMembers.map(m=>{
                const active=subIds.includes(m.id);
                const mt=teams.find(t=>t.id===m.teamId);
                const col=mt?mt.color:C.blue;
                return(<button key={m.id} className="tap" onClick={()=>toggleSubAssignee(s.id,m.id)}
                  style={{display:"flex",alignItems:"center",gap:4,padding:"3px 9px",borderRadius:20,
                    border:"1px solid "+(active?col+"66":C.border2),
                    background:active?col+"14":"transparent",
                    color:active?col:C.dim,
                    cursor:"pointer",fontSize:12,fontWeight:500}}>

function DrawingCanvas({noteId,onSave}){
  const canvasRef=React.useRef(null);
  const [tool,setTool]=useState("pen");
  const [color,setColor]=useState("#e8f4ff");
  const [size,setSize]=useState(3);
  const [drawing,setDrawing]=useState(false);
  const lastPt=React.useRef(null);
  const storageKey="ct:drawing:"+noteId;
  React.useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const saved=LS.get(storageKey);
    if(saved){const img=new window.Image();img.onload=()=>ctx.drawImage(img,0,0);img.src=saved;}
    else{ctx.fillStyle="#0f1e2e";ctx.fillRect(0,0,canvas.width,canvas.height);}
  },[noteId]);
  const saveCanvas=()=>{const canvas=canvasRef.current;if(!canvas)return;LS.set(storageKey,canvas.toDataURL());if(onSave)onSave();};
  const getPos=(e,canvas)=>{
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy,pressure:e.touches[0].force||0.5};
    return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy,pressure:e.pressure||0.5};
  };
  const startDraw=(e)=>{
    e.preventDefault();const canvas=canvasRef.current;if(!canvas)return;
    const pt=getPos(e,canvas);lastPt.current=pt;setDrawing(true);
  };
  const doDraw=(e)=>{
    e.preventDefault();if(!drawing)return;
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");
    const pt=getPos(e,canvas);const pressure=Math.max(0.1,pt.pressure);
    if(tool==="eraser"){
      ctx.globalCompositeOperation="destination-out";
      ctx.beginPath();ctx.arc(pt.x,pt.y,size*5,0,Math.PI*2);ctx.fill();
      ctx.globalCompositeOperation="source-over";
    } else {
      ctx.globalCompositeOperation="source-over";
      ctx.strokeStyle=tool==="highlighter"?color+"99":color;
      ctx.lineWidth=tool==="highlighter"?size*5:size*(0.5+pressure*1.5);
      ctx.lineCap="round";ctx.lineJoin="round";
      ctx.globalAlpha=tool==="highlighter"?0.45:1;
      if(lastPt.current){ctx.beginPath();ctx.moveTo(lastPt.current.x,lastPt.current.y);ctx.lineTo(pt.x,pt.y);ctx.stroke();}
      ctx.globalAlpha=1;
    }
    lastPt.current=pt;
  };
  const endDraw=()=>{if(!drawing)return;setDrawing(false);lastPt.current=null;saveCanvas();};
  const clearCanvas=()=>{
    if(!window.confirm("Clear this drawing?"))return;
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext("2d");ctx.fillStyle="#0f1e2e";ctx.fillRect(0,0,canvas.width,canvas.height);
    LS.set(storageKey,canvas.toDataURL());
  };
  const COLORS=["#e8f4ff","#f0c040","#6ac47a","#e05a4e","#4a9eca","#c084fc","#f97316","#ffffff"];
  const TOOLS=[{id:"pen",icon:"✏️"},{id:"highlighter",icon:"🖊"},{id:"eraser",icon:"◻️"}];
  const SIZES=[{v:2,label:"S"},{v:4,label:"M"},{v:8,label:"L"}];
  return(<div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:C.bg1,borderBottom:"1px solid "+C.border2,flexWrap:"wrap",flexShrink:0}}>
      <div style={{display:"flex",gap:4}}>
        {TOOLS.map(t=><button key={t.id} className="tap" onClick={()=>setTool(t.id)}
          style={{padding:"5px 9px",borderRadius:8,border:"1px solid "+(tool===t.id?C.gold:C.border2),
            background:tool===t.id?C.gold+"22":"transparent",cursor:"pointer",fontSize:15}}>{t.icon}</button>)}
      </div>
      <div style={{width:1,height:20,background:C.border2}}/>
      <div style={{display:"flex",gap:3}}>
        {COLORS.map(col=><button key={col} className="tap" onClick={()=>setColor(col)}
          style={{width:20,height:20,borderRadius:"50%",background:col,border:color===col?"2.5px solid white":"2px solid "+C.border2,cursor:"pointer",flexShrink:0}}/>)}
      </div>
      <div style={{width:1,height:20,background:C.border2}}/>
      <div style={{display:"flex",gap:4}}>
        {SIZES.map(s=><button key={s.v} className="tap" onClick={()=>setSize(s.v)}
          style={{padding:"3px 9px",borderRadius:8,border:"1px solid "+(size===s.v?C.gold:C.border2),
            background:size===s.v?C.gold+"22":"transparent",cursor:"pointer",color:size===s.v?C.gold:C.muted,fontSize:11,fontWeight:700}}>{s.label}</button>)}
      </div>
      <button className="tap" onClick={clearCanvas} style={{marginLeft:"auto",padding:"4px 10px",borderRadius:8,border:"1px solid "+C.border2,background:"transparent",color:C.dim,cursor:"pointer",fontSize:11}}>Clear</button>
    </div>
    <div style={{flex:1,overflow:"hidden",touchAction:"none",position:"relative",background:"#0f1e2e"}}>
      <canvas ref={canvasRef} width={1600} height={2000}
        style={{width:"100%",height:"100%",display:"block",cursor:tool==="eraser"?"cell":"crosshair"}}
        onPointerDown={startDraw} onPointerMove={doDraw} onPointerUp={endDraw} onPointerLeave={endDraw}/>
    </div>
  </div>);
}

          :<DrawingCanvas noteId={note.id} onSave={()=>updateNote("updatedAt",new Date().toISOString())}/>
        }
      </>)
      :<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:10,color:C.dim}}>
        <div style={{fontSize:32}}>📝</div>
        <div style={{fontSize:14}}>Select or create a note</div>
      </div>}
    </div>
  </div>);
}

function ProTimesheetTab({tasks,projects,session,members}){
  const today=new Date();const dow=today.getDay();
  const sat=new Date(today);sat.setDate(today.getDate()-(dow===6?0:dow+1));
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(sat);d.setDate(sat.getDate()+i);return d;});
  const key="ct:ts:"+(session&&session.userId||"anon")+":"+sat.toISOString().slice(0,10);
  const [hours,setHours]=useState(()=>LS.get(key)||{});
  const [weekOffset,setWeekOffset]=useState(0);
  const [expandOH,setExpandOH]=useState(true);
  const save=(h)=>{setHours(h);LS.set(key,h);};
  const myId=session&&session.memberId;
  const allProjects=projects.filter(p=>p.projectStatus!=="archive").sort((a,b)=>(a.projectNumber||"").localeCompare(b.projectNumber||"",undefined,{numeric:true}));
  const tsRowsKey="ct:ts:rows:"+(session&&session.userId||"anon");
  const [selectedProjIds,setSelectedProjIds]=useState(()=>LS.get(tsRowsKey)||[]);
  const addProjRow=(id)=>{if(!id||selectedProjIds.includes(id))return;const next=[...selectedProjIds,id];setSelectedProjIds(next);LS.set(tsRowsKey,next);};
  const removeProjRow=(id)=>{const next=selectedProjIds.filter(x=>x!==id);setSelectedProjIds(next);LS.set(tsRowsKey,next);};
  const myProjects=selectedProjIds.map(id=>allProjects.find(p=>p.id===id)).filter(Boolean);

  // Each project can have multiple activity rows
  const ACTIVITIES=["General Civil Design Phase","Construction Engineering","Construction Observation","Asbuilt Phase","Permit Application","Preliminary","Other"];
  const OVERHEAD_CATS=["Administration","Bereavement Paid Leave","Community Service Leave","Jury Duty","Marketing","Maternity/Paternity Paid Leave","Paid Leave","Professional Development","Sick - Paid Leave"];

  // Row keys: direct = "d_projId_actIdx", overhead = "oh_catIdx"
  const getVal=(rowKey,di)=>parseFloat(hours[rowKey+"_"+di]||0)||0;
  const setVal=(rowKey,di,val)=>save({...hours,[rowKey+"_"+di]:val||""});
  const rowTotal=(rowKey)=>weekDays.reduce((s,_,i)=>s+getVal(rowKey,i),0);
  const dayDirect=(di)=>myProjects.reduce((s,p)=>{
    const rk="d_"+p.id+"_0";
    return s+getVal(rk,di);
  },0);
  // Actually sum all activity rows per project
  const dayDirectAll=(di)=>myProjects.reduce((s,p)=>s+getVal("d_"+p.id,di),0);
  const dayOH=(di)=>OVERHEAD_CATS.reduce((s,_,ci)=>s+getVal("oh_"+ci,di),0);
  const grandDirect=weekDays.reduce((s,_,i)=>s+dayDirectAll(i),0);
  const grandOH=weekDays.reduce((s,_,i)=>s+dayOH(i),0);
  const grandTotal=grandDirect+grandOH;

  const fmtDate=(d)=>d.toLocaleDateString("en-US",{month:"2-digit",day:"2-digit"});
  const weekLabel=(d)=>d.toLocaleDateString("en-US",{weekday:"short"}).slice(0,3);

  const thStyle={padding:"4px 6px",color:C.dim,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
    fontSize:10,letterSpacing:1,borderBottom:"1px solid "+C.border,borderRight:"1px solid "+C.border2,
    textAlign:"center",whiteSpace:"nowrap",background:C.bgDeep};
  const tdStyle={padding:"3px 4px",borderBottom:"1px solid "+C.border2,borderRight:"1px solid "+C.border2,fontSize:11,color:C.text};
  const inp=(rowKey,di)=><input type="number" min="0" max="24" step="0.25"
    value={hours[rowKey+"_"+di]||""}
    onChange={e=>setVal(rowKey,di,e.target.value)}
    style={{width:44,textAlign:"center",padding:"2px",fontSize:11,
      background:"transparent",border:"none",color:C.text,outline:"none"}}/>;
  const totCell=(v)=><td style={{...tdStyle,textAlign:"center",fontWeight:600,color:v>0?C.text:C.dim,background:C.bgDeep}}>{v>0?v.toFixed(2):""}</td>;

  return(<div style={{overflowX:"auto",fontSize:12}}>
    {/* Week nav */}
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderBottom:"1px solid "+C.border,background:C.bg1}}>
      <button className="tap" onClick={()=>{const d=new Date(sat);d.setDate(d.getDate()-7);setWeekOffset(w=>w-1);}} style={{background:C.bgInput,border:"1px solid "+C.border2,borderRadius:6,color:C.muted,padding:"4px 10px",cursor:"pointer",fontSize:12}}>‹ Prev</button>
      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:C.heading}}>
        Week of {sat.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}
      </span>
      <button className="tap" onClick={()=>{setWeekOffset(w=>w+1);}} style={{background:C.bgInput,border:"1px solid "+C.border2,borderRadius:6,color:C.muted,padding:"4px 10px",cursor:"pointer",fontSize:12}}>Next ›</button>
    </div>

    <table style={{borderCollapse:"collapse",width:"100%",minWidth:700}}>
      {/* Header */}
      <thead>
        <tr>
          <th style={{...thStyle,textAlign:"left",minWidth:200,width:220}}>Project</th>
          <th style={{...thStyle,textAlign:"left",minWidth:140,width:160}}>Phase</th>
          <th style={{...thStyle,textAlign:"left",minWidth:70,width:80}}>Activity</th>
          {weekDays.map((d,i)=>{const isT=d.toDateString()===today.toDateString();return(<th key={i} style={{...thStyle,minWidth:52,background:isT?C.gold+"18":C.bgDeep,color:isT?C.gold:C.dim}}>
            <div>{weekLabel(d)}</div>
            <div style={{fontWeight:400,fontSize:9}}>{fmtDate(d)}</div>
          </th>);})}
          <th style={{...thStyle,minWidth:54,background:C.bgDeep}}>Total</th>
        </tr>
      </thead>
      <tbody>
        {/* DIRECT section header */}
        <tr style={{background:"#1a3a5a"}}>
          <td colSpan={3} style={{padding:"5px 8px",fontWeight:700,fontSize:11,color:C.blue,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>DIRECT</td>
          {weekDays.map((_,i)=><td key={i} style={{borderRight:"1px solid "+C.border2}}/>)}
          <td/>
        </tr>

        {/* Direct project rows */}
        <tr style={{background:C.bg1}}>
          <td colSpan={3} style={{padding:"6px 8px"}}>
            <select onChange={e=>{addProjRow(e.target.value);e.target.value="";}}
              style={{background:C.bgInput,border:"1px solid "+C.border2,borderRadius:6,color:C.muted,
                fontSize:11,padding:"4px 8px",width:"100%",cursor:"pointer"}}>
              <option value="">+ Add project to timesheet…</option>
              {allProjects.filter(p=>!selectedProjIds.includes(p.id)).map(p=>(
                <option key={p.id} value={p.id}>{p.projectNumber?p.projectNumber+" · ":""}{p.name.slice(0,50)}</option>
              ))}
            </select>
          </td>
          {weekDays.map((_,i)=><td key={i}/>)}<td/>
        </tr>
        {myProjects.length===0&&<tr><td colSpan={11} style={{padding:"12px 8px",textAlign:"center",color:C.dim,fontSize:11}}>Use the dropdown above to add projects</td></tr>}
        {myProjects.map(p=>{
          const rk="d_"+p.id;
          const rt=rowTotal(rk);
          return(<tr key={p.id} style={{borderBottom:"1px solid "+C.border2}}>
            <td style={{...tdStyle,padding:"3px 8px"}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <button className="tap" onClick={()=>removeProjRow(p.id)}
                  style={{background:"transparent",border:"none",color:C.dim,cursor:"pointer",fontSize:12,padding:"0 2px",flexShrink:0,lineHeight:1}}>✕</button>
                <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {p.projectNumber&&<span style={{color:C.dim,fontSize:10,marginRight:4}}>{p.projectNumber}</span>}
                  <span style={{color:C.text}}>{p.name.length>32?p.name.slice(0,32)+"…":p.name}</span>
                </div>
              </div>
            </td>
            <td style={{...tdStyle,padding:"3px 6px"}}>
              <select value={hours["act_"+p.id]||ACTIVITIES[0]} onChange={e=>save({...hours,["act_"+p.id]:e.target.value})}
                style={{background:"transparent",border:"none",color:C.muted,fontSize:11,width:"100%",cursor:"pointer"}}>
                {ACTIVITIES.map(a=><option key={a} value={a}>{a}</option>)}
              </select>
            </td>
            <td style={{...tdStyle,textAlign:"center",color:C.dim,fontSize:10}}>Billable</td>
            {weekDays.map((_,i)=>{const isT=weekDays[i].toDateString()===today.toDateString();
              return(<td key={i} style={{...tdStyle,textAlign:"center",background:isT?C.gold+"08":"transparent"}}>{inp(rk,i)}</td>);})}
            {totCell(rt)}
          </tr>);
        })}

        {/* Direct totals row */}
        <tr style={{background:C.bgDeep,borderTop:"2px solid "+C.border}}>
          <td colSpan={3} style={{padding:"5px 8px",fontWeight:700,fontSize:11,color:C.muted,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>Direct</td>
          {weekDays.map((_,i)=>{const v=dayDirectAll(i);return(<td key={i} style={{...tdStyle,textAlign:"center",fontWeight:700,color:v>0?C.text:C.dim,background:C.bgDeep}}>{v>0?v.toFixed(2):""}</td>);})}
          <td style={{...tdStyle,textAlign:"center",fontWeight:700,color:grandDirect>0?C.gold:C.dim,background:C.bgDeep}}>{grandDirect>0?grandDirect.toFixed(2):""}</td>
        </tr>

        {/* OVERHEAD section */}
        <tr style={{background:"#1a3a5a",cursor:"pointer"}} onClick={()=>setExpandOH(v=>!v)}>
          <td colSpan={3} style={{padding:"5px 8px",fontWeight:700,fontSize:11,color:C.blue,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>
            <span style={{marginRight:6}}>{expandOH?"▾":"▸"}</span>Overhead
          </td>
          {weekDays.map((_,i)=><td key={i} style={{borderRight:"1px solid "+C.border2}}/>)}
          <td/>
        </tr>

        {expandOH&&OVERHEAD_CATS.map((cat,ci)=>{
          const rk="oh_"+ci;const rt=rowTotal(rk);
          return(<tr key={ci} style={{borderBottom:"1px solid "+C.border2}}>
            <td colSpan={3} style={{...tdStyle,padding:"3px 8px",color:C.muted}}>{cat}</td>
            {weekDays.map((_,i)=>{const isT=weekDays[i].toDateString()===today.toDateString();
              return(<td key={i} style={{...tdStyle,textAlign:"center",background:isT?C.gold+"08":"transparent"}}>{inp(rk,i)}</td>);})}
            {totCell(rt)}
          </tr>);
        })}

        {/* Overhead totals */}
        <tr style={{background:C.bgDeep,borderTop:"2px solid "+C.border}}>
          <td colSpan={3} style={{padding:"5px 8px",fontWeight:700,fontSize:11,color:C.muted,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>Overhead</td>
          {weekDays.map((_,i)=>{const v=dayOH(i);return(<td key={i} style={{...tdStyle,textAlign:"center",fontWeight:700,color:v>0?C.text:C.dim,background:C.bgDeep}}>{v>0?v.toFixed(2):"0.00"}</td>);})}
          <td style={{...tdStyle,textAlign:"center",fontWeight:700,color:grandOH>0?C.gold:C.dim,background:C.bgDeep}}>{grandOH.toFixed(2)}</td>
        </tr>

        {/* Grand total */}
        <tr style={{background:"#0a1828",borderTop:"2px solid "+C.border}}>
          <td colSpan={3} style={{padding:"6px 8px",fontWeight:700,fontSize:12,color:C.heading,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>Timesheet Total</td>
          {weekDays.map((_,i)=>{const v=dayDirectAll(i)+dayOH(i);return(<td key={i} style={{...tdStyle,textAlign:"center",fontWeight:700,color:v>0?C.gold:C.dim,background:"#0a1828",fontSize:12}}>{v>0?v.toFixed(2):""}</td>);})}
          <td style={{...tdStyle,textAlign:"center",fontWeight:700,color:C.gold,background:"#0a1828",fontSize:12}}>{grandTotal>0?grandTotal.toFixed(2):""}</td>
        </tr>
      </tbody>
    </table>
  </div>);
}



function DashboardView({projects,tasks,members,teams,companies,selCompany,setSelCompany,session,onSelectProject,onAddTask,onUpdateTask}){
  const [spaceTab,setSpaceTab]=useState("home");
  const [selM,setSelM]=useState(null);

  const today=new Date(); today.setHours(0,0,0,0);
  const coProjects=(selCompany==="all"?projects:projects.filter(p=>p.companyId===selCompany)).filter(p=>p.projectStatus!=="archive");
  const coProjIds=new Set(coProjects.map(p=>p.id));
  const coTasks=selCompany==="all"?tasks:tasks.filter(t=>coProjIds.has(t.projectId));
  const myMemberId=session&&session.memberId;

  // My Tasks — personal (if member linked) or all open tasks (if admin/leader with no memberId)
  const myTasks=myMemberId
    ? coTasks.filter(t=>(t.assigneeIds||[t.assigneeId]).filter(Boolean).includes(myMemberId)&&t.status!=="done")
        .map(t=>{const dt=t.dueDate?new Date(t.dueDate):null;if(dt)dt.setHours(0,0,0,0);return{...t,_dt:dt};})
        .sort((a,b)=>(a._dt||new Date("9999"))-(b._dt||new Date("9999")))
    : [];

  // Stats
  const total=coTasks.length;
  const inprog=coTasks.filter(t=>t.status==="inprogress").length;
  const overdue=coTasks.filter(t=>isOverdue(t)).length;

  // Upcoming: next 7 days, not done
  const in7=new Date(today.getTime()+7*86400000);
  const upcoming=coTasks
    .filter(t=>t.dueDate&&t.status!=="done")
    .map(t=>{const dt=new Date(t.dueDate);dt.setHours(0,0,0,0);return{...t,_dt:dt};})
    .filter(t=>t._dt>=today&&t._dt<=in7)
    .sort((a,b)=>a._dt-b._dt);

  // Calendar
  const [calMode,setCalMode]=useState("week");
  const [calDate,setCalDate]=useState(new Date());
  const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const DAY_NAMES=["Su","Mo","Tu","We","Th","Fr","Sa"];
  const monthYear=calDate.getFullYear();
  const monthIdx=calDate.getMonth();

  // Month grid
  const firstDay=new Date(monthYear,monthIdx,1).getDay();
  const daysInMonth=new Date(monthYear,monthIdx+1,0).getDate();
  const weeks=[];
  let wk=new Array(firstDay).fill(null);
  for(let d=1;d<=daysInMonth;d++){wk.push(d);if(wk.length===7){weeks.push(wk);wk=[];}}
  if(wk.length)weeks.push([...wk,...new Array(7-wk.length).fill(null)]);

  const tasksByDay={};
  coTasks.filter(t=>t.dueDate&&t.status!=="done").forEach(t=>{
    const dt=new Date(t.dueDate);dt.setHours(0,0,0,0);
    if(dt.getFullYear()===monthYear&&dt.getMonth()===monthIdx){
      const d=dt.getDate();if(!tasksByDay[d])tasksByDay[d]=[];tasksByDay[d].push(t);
    }
  });

  // Week view: Mon–Sun
  const weekStart=new Date(calDate);
  const wdow=weekStart.getDay();
  weekStart.setDate(weekStart.getDate()-(wdow===0?6:wdow-1));
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(weekStart);d.setDate(d.getDate()+i);return d;});
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+6);

  const navPrev=()=>{const d=new Date(calDate);calMode==="month"?d.setMonth(d.getMonth()-1):d.setDate(d.getDate()-7);setCalDate(d);};
  const navNext=()=>{const d=new Date(calDate);calMode==="month"?d.setMonth(d.getMonth()+1):d.setDate(d.getDate()+7);setCalDate(d);};
  const chipColor=(t)=>isOverdue(t)?C.red:t.priority==="high"?C.gold:C.blue;
  const fmtWhen=(dt)=>{const diff=Math.round((dt-today)/86400000);if(diff===0)return"Today";if(diff===1)return"Tomorrow";return DAY_NAMES[dt.getDay()]+" "+MONTH_NAMES[dt.getMonth()].slice(0,3)+" "+dt.getDate();};

  const timeOfDay=new Date().getHours()<12?"Good morning":new Date().getHours()<17?"Good afternoon":"Good evening";
  const firstName=session.name.split(" ")[0];
  return(<div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    <div style={{display:"flex",borderBottom:"1px solid "+C.border2,flexShrink:0,background:C.bg1}}>
      {[["home","Overview","🏠"],["tasks","My Tasks","✅"],["notes","Notes","📝"],["time","Timesheet","⏱"]].map(([id,lbl,emoji])=>{
        const active=spaceTab===id;
        return(<button key={id} className="tap" onClick={()=>setSpaceTab(id)}
          style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"9px 4px 7px",
            background:active?C.gold+"10":"transparent",border:"none",
            borderBottom:active?"2px solid "+C.gold:"2px solid transparent",
            color:active?C.gold:C.muted,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",
            fontWeight:700,fontSize:10,letterSpacing:0.8,textTransform:"uppercase",marginBottom:-1}}>
          <span style={{fontSize:18,lineHeight:1,filter:active?"saturate(1.2)":"saturate(0.7) opacity(0.7)"}}>{emoji}</span>
          <span style={{marginTop:1}}>{lbl}</span>
        </button>);
      })}
    </div>
    <div style={{flex:1,overflowY:"auto"}}>
      {spaceTab==="home"&&<div style={{display:"flex",flexDirection:"column",gap:18}}>

    {/* ── Welcome bar ──────────────────────────────────────────────────────── */}
    <div style={{borderRadius:14,border:"1px solid "+C.gold+"44",background:"linear-gradient(135deg,"+C.gold+"14 0%,"+C.blue+"0a 100%)",padding:"16px 18px"}}>
      <div style={{marginBottom:12}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:22,color:C.heading,lineHeight:1.1}}>
          {timeOfDay}, {firstName}
        </div>
        <div style={{fontSize:12,color:C.muted,marginTop:4}}>
          {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
        {[[total,"Tasks",C.blue],[inprog,"Active",C.gold],[overdue,"Overdue",C.red],[coProjects.length,"Projects",C.green]].map(([v,lbl,col])=>(
          <div key={lbl} style={{background:col+"18",border:"1px solid "+col+"44",borderRadius:10,padding:"10px 8px",textAlign:"center"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:700,color:col,lineHeight:1}}>{v}</div>
            <div style={{fontSize:9,color:col,letterSpacing:1.2,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",marginTop:3,opacity:0.8}}>{lbl}</div>
          </div>
        ))}
      </div>
    </div>

    {/* ── Company switcher ─────────────────────────────────────────────────── */}
    <CompanySwitcher companies={companies} selCompany={selCompany} setSelCompany={setSelCompany}/>

    {/* ── Member rail ── */}
    {(()=>{
      const coMems=(selCompany==="all"?members:members.filter(m=>m.companyId===selCompany)).sort((a,b)=>a.name.localeCompare(b.name));
      return coMems.length>0?<div style={{marginBottom:4}}>
        <MemberRail members={coMems} teams={teams} companies={companies} selCompany={selCompany} selMemberId={selM} onSelect={setSelM}/>
        {selM&&<MemberSummaryBar memberId={selM} members={members} teams={teams} projects={projects} tasks={tasks} companies={companies}/>}
      </div>:null;
    })()}

    {/* ── My Tasks ─────────────────────────────────────────────────────────── */}
    {myMemberId&&<div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <div style={{width:3,height:16,borderRadius:2,background:C.blue,flexShrink:0}}/>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,color:C.heading,letterSpacing:1,textTransform:"uppercase",flex:1}}>My Tasks</div>
        {myTasks.length>0&&<div style={{fontSize:11,fontWeight:600,color:C.muted,background:C.bgTrack,borderRadius:10,padding:"1px 8px"}}>{myTasks.length}</div>}
      </div>
      {myTasks.length===0
        ?<div style={{padding:"18px",textAlign:"center",color:C.dim,fontSize:13,background:C.bg1,borderRadius:12,border:"1px solid "+C.border}}>
            🎉 All caught up — no open tasks assigned to you.
          </div>
        :<div style={{display:"flex",flexDirection:"column",gap:6}}>
          {myTasks.map(t=>{
            const proj=projects.find(p=>p.id===t.projectId);
            const od=isOverdue(t);
            const sc2=SC[t.status]||SC.todo;
            return(
              <div key={t.id} onClick={()=>proj&&onSelectProject(t.projectId)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
                  background:C.bg1,border:"1px solid "+(od?C.red+"55":C.border),
                  borderRadius:11,cursor:proj?"pointer":"default"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:sc2.color,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:od?C.red:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>

                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3,flexShrink:0}}>
                  {t.dueDate&&<div style={{fontSize:11,fontWeight:600,color:od?C.red:C.muted,whiteSpace:"nowrap"}}>{od?"⚠ ":""}{fmtShort(t.dueDate)}</div>}
                  <div style={{fontSize:9,fontWeight:700,color:sc2.color,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:0.5}}>{sc2.label}</div>
                </div>
              </div>
            );
          })}
        </div>
      }
    </div>}

    {/* ── Upcoming 7 days ──────────────────────────────────────────────────── */}
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <div style={{width:3,height:16,borderRadius:2,background:C.gold,flexShrink:0}}/>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,color:C.heading,letterSpacing:1,textTransform:"uppercase",flex:1}}>Upcoming — Next 7 Days</div>
        <div style={{fontSize:11,fontWeight:600,color:C.muted,background:C.bgTrack,borderRadius:10,padding:"1px 8px"}}>{upcoming.length}</div>
      </div>
      {upcoming.length===0

          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",borderBottom:wi<weeks.length-1?"1px solid "+C.border2:"none"}}>

                  {day&&<div style={{fontSize:10,fontWeight:isToday?700:400,color:isToday?C.gold:C.muted,textAlign:"right",padding:"1px 3px",lineHeight:1,marginBottom:2}}>{day}</div>}
                  {dayTasks.slice(0,2).map(t=>{

                        style={{fontSize:9,lineHeight:1.3,padding:"1px 3px",marginBottom:1,borderRadius:3,

      {/* Week list */}

          const dayTasks=coTasks.filter(t=>{

                <div style={{minWidth:108,display:"flex",alignItems:"baseline",gap:6}}>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:22,color:isToday?C.gold:isPast?C.dim:C.heading,lineHeight:1}}>{wd.getDate()}</span>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:11,color:isToday?C.gold:C.muted,textTransform:"uppercase",letterSpacing:0.5}}>{DAY_NAMES[wd.getDay()]} · {MONTH_NAMES[wd.getMonth()].slice(0,3)}</span>
                </div>
                {isToday&&<div style={{fontSize:9,fontWeight:700,color:C.gold,background:"rgba(232,160,32,0.14)",borderRadius:6,padding:"2px 7px",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:0.5}}>TODAY</div>}
                {dayTasks.length===0&&<div style={{fontSize:11,color:C.dim,fontStyle:"italic",marginLeft:"auto"}}>No tasks due</div>}
              </div>
              {dayTasks.map((t,j)=>{
                const proj=projects.find(p=>p.id===t.projectId);
                const col=chipColor(t);
                const sc2=SC[t.status]||SC.todo;
                return(
                  <div key={t.id} onClick={()=>proj&&onSelectProject(t.projectId)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px 8px 24px",
                      borderBottom:j<dayTasks.length-1?"1px solid "+C.border2:"none",cursor:proj?"pointer":"default"}}>
                    <div style={{width:3,height:30,borderRadius:2,background:col,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:500,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                      {proj&&<div style={{fontSize:11,color:C.muted,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{proj.projectNumber&&proj.projectNumber+" · "}{proj.name}</div>}
                    </div>
                    <div style={{flexShrink:0,padding:"2px 8px",borderRadius:10,background:sc2.color+"18",border:"1px solid "+sc2.color+"44"}}>
                      <span style={{fontSize:10,fontWeight:700,color:sc2.color,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:0.3}}>{sc2.label}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>}
    </div>

  </div>}
      {spaceTab==="tasks"&&<TabErrorBoundary><PersonalTasksTab tasks={tasks} projects={projects} members={members} session={session} onUpdateTask={onUpdateTask} onAddTask={onAddTask}/></TabErrorBoundary>}
      {spaceTab==="notes"&&<TabErrorBoundary><ProNotesTab session={session}/></TabErrorBoundary>}
      {spaceTab==="time"&&<TabErrorBoundary><ProTimesheetTab tasks={tasks} projects={projects} session={session} members={members}/></TabErrorBoundary>}
    </div>
  </div>);
}

function ProjectListView({projects,tasks,members,teams,companies,selCompany,setSelCompany,
  onSelectProject,onAddProject,onDelProject,onUpdateTask,onAddTask,onUpdateProject,canEdit}){

  const allCoProjects=selCompany==="all"?projects:projects.filter(p=>p.companyId===selCompany);
  const filteredProjects=allCoProjects.filter(p=>p.projectStatus!=="archive");
  const filteredMembers=selCompany==="all"?members:members.filter(m=>m.companyId===selCompany);
  const filteredTeams=selCompany==="all"?teams:teams.filter(t=>t.companyId===selCompany);

  const [expanded,setExpanded]=useState({});
  const [inlineTask,setInlineTask]=useState(null);
  const [editProjId,setEditProjId]=useState(null); // project being inline-edited
  const [editProjForm,setEditProjForm]=useState(null);
  const [addTaskProj,setAddTaskProj]=useState(null);
  const [taskSheet,setTaskSheet]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [confirmP,setConfirmP]=useState(null);
  const [form,setForm]=useState({name:"",teamId:"",description:"",projectStatus:"construction",
    companyId:selCompany!=="all"?selCompany:"c2",assigneeIds:[],teamMemberIds:[],
    projectNumber:"",principalInCharge:"",projectManager:""});
  const [search,setSearch]=useState("");
  const [filterPhase,setFilterPhase]=useState("all");
  const [filterTeam,setFilterTeam]=useState("all");
  const [filterPrincipal,setFilterPrincipal]=useState("all");
  const [filterPM,setFilterPM]=useState("all");
  const [filterMember,setFilterMember]=useState("all");
  const [showFilters,setShowFilters]=useState(false);
  const [showArchived,setShowArchived]=useState(false);
  const toggle=(id)=>setExpanded(e=>({...e,[id]:!e[id]}));

  const openEditProj=(p)=>{
    setEditProjId(p.id);
    setEditProjForm({...p});
    setInlineTask(null);
  };
  const saveEditProj=()=>{
    if(onUpdateProject&&editProjForm)onUpdateProject({...editProjForm});
    setEditProjId(null);setEditProjForm(null);
  };
  const cancelEditProj=()=>{setEditProjId(null);setEditProjForm(null);};

  const matchesSearch=(p)=>{
    if(!search)return true;
    const q=search.toLowerCase();
    const prin=members.find(m=>m.id===p.principalInCharge);
    const pm=members.find(m=>m.id===p.projectManager);
    const co=companies.find(c=>c.id===p.companyId);
    const team=teams.find(t=>t.id===p.teamId);
    return p.name.toLowerCase().includes(q)||
      (p.projectNumber&&p.projectNumber.toLowerCase().includes(q))||
      (co&&co.name.toLowerCase().includes(q))||
      (prin&&prin.name.toLowerCase().includes(q))||
      (pm&&pm.name.toLowerCase().includes(q))||
      (team&&team.name.toLowerCase().includes(q))||
      ((p.description||"").toLowerCase().includes(q));
  };
  const displayProjects=filteredProjects.filter(p=>
    (filterPhase==="all"||(p.projectStatus||"construction")===filterPhase)&&
    (filterTeam==="all"||p.teamId===filterTeam)&&
    (filterPrincipal==="all"||p.principalInCharge===filterPrincipal)&&
    (filterPM==="all"||p.projectManager===filterPM)&&
    (filterMember==="all"||(p.teamMemberIds||[]).includes(filterMember))&&
    matchesSearch(p)
  );
  const sortedProjects=useMemo(()=>[...displayProjects].sort((a,b)=>{
    const gn=(id,arr)=>(arr.find(x=>x.id===id)||{}).name||"";
    let v=0;
    if(sortCol==="num")v=(a.projectNumber||"").localeCompare(b.projectNumber||"",undefined,{numeric:true});
    else if(sortCol==="name")v=(a.name||"").localeCompare(b.name||"");
    else if(sortCol==="phase")v=(a.projectStatus||"").localeCompare(b.projectStatus||"");
    else if(sortCol==="firm")v=gn(a.companyId,companies).localeCompare(gn(b.companyId,companies));
    else if(sortCol==="principal")v=gn(a.principalInCharge,members).localeCompare(gn(b.principalInCharge,members));
    else if(sortCol==="pm")v=gn(a.projectManager,members).localeCompare(gn(b.projectManager,members));
    else if(sortCol==="team")v=gn(a.teamId,teams).localeCompare(gn(b.teamId,teams));
    return sortDir==="asc"?v:-v;
  }),[displayProjects,sortCol,sortDir,companies,members,teams]);
  const activeFilters=(filterPhase!=="all"?1:0)+(filterTeam!=="all"?1:0)+
    (filterPrincipal!=="all"?1:0)+(filterPM!=="all"?1:0)+(filterMember!=="all"?1:0)+(search?1:0);
  const clearFilters=()=>{setFilterPhase("all");setFilterTeam("all");setFilterPrincipal("all");
    setFilterPM("all");setFilterMember("all");setSearch("");};

  const getTaskAssigneeIds=(task)=>task.assigneeIds||(task.assigneeId?[task.assigneeId]:[]);
  const dueFmt=(d)=>{if(!d)return"—";const now=new Date();now.setHours(0,0,0,0);const dt=new Date(d);dt.setHours(0,0,0,0);const diff=Math.round((dt-now)/(1000*60*60*24));if(diff<-1)return fmtShort(d);if(diff===-1)return"Yesterday";if(diff===0)return"Today";if(diff===1)return"Tomorrow";return fmtShort(d);};
  const dueColor=(d,done)=>{if(done||!d)return C.dim;const now=new Date();now.setHours(0,0,0,0);const dt=new Date(d);dt.setHours(0,0,0,0);const diff=Math.round((dt-now)/(1000*60*60*24));if(diff<0)return C.red;if(diff===0)return C.gold;return C.muted;};

  const StatusPill=({status})=>{const sc=SC[status]||SC.todo;return<div style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:20,border:"1px solid "+sc.color+"55",background:sc.color+"12",whiteSpace:"nowrap"}}><div style={{width:6,height:6,borderRadius:"50%",background:sc.color}}/><span style={{fontSize:10,fontWeight:700,color:sc.color,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase"}}>{sc.label}</span></div>;};
  const PriLabel=({priority})=><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:13,color:priority==="high"?C.red:C.dim}}>🚩</span>{priority==="high"&&<span style={{fontSize:11,color:C.red,fontWeight:600}}>Urgent</span>}</div>;
  const AssigneeAvatars=({ids})=>{const as=(ids||[]).map(id=>members.find(m=>m.id===id)).filter(Boolean);if(!as.length)return<span style={{color:C.border,fontSize:16}}>◯</span>;return<div style={{display:"flex"}}>{as.slice(0,3).map((m,i)=>{const mt=teams.find(t=>t.id===m.teamId);return<div key={m.id} style={{marginLeft:i>0?-8:0,zIndex:as.length-i}}><Av initials={m.avatar} color={mt?mt.color:C.blue} size={20}/></div>;})} {as.length>3&&<div style={{marginLeft:-8,width:20,height:20,borderRadius:"50%",background:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:C.muted}}>+{as.length-3}</div>}</div>;};
  const PhasePill=({status})=>{const ps=PROJ_STATUS[status||"construction"]||PROJ_STATUS.construction;return<div style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:20,border:"1px solid "+ps.color+"55",background:ps.color+"14",whiteSpace:"nowrap"}}><div style={{width:5,height:5,borderRadius:"50%",background:ps.color,flexShrink:0}}/><span style={{fontSize:10,fontWeight:700,color:ps.color,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:0.3}}>{ps.label}</span></div>;};
  const PersonCell=({memberId})=>{const m=members.find(x=>x.id===memberId);const mt=m?teams.find(t=>t.id===m.teamId):null;if(!m)return<span style={{fontSize:11,color:C.dim}}>—</span>;return<div style={{display:"flex",alignItems:"center",gap:5}}><Av initials={m.avatar} color={mt?mt.color:C.blue} size={18}/><span style={{fontSize:11,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name.split(" ").map((w,i)=>i===0?w[0]+".":w).join(" ")}</span></div>;};

  // Inline task editor panel
  const TaskInlineEdit=({task,proj})=>{
    const pool=proj&&proj.teamId?members.filter(m=>m.teamId===proj.teamId):(proj&&proj.companyId?members.filter(m=>m.companyId===proj.companyId):members);
    const ids=getTaskAssigneeIds(task);

    return(<div style={{background:C.bgInline,borderTop:"1px solid "+C.border2,padding:"10px 14px 12px 38px",display:"flex",flexDirection:"column",gap:10}}>
      {/* Project # badge */}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <LBL>Project</LBL>
        <ProjNum num={proj?proj.projectNumber:"—"}/>
        {proj&&<span style={{fontSize:11,color:C.muted}}>{proj.name}</span>}
      </div>
      {/* Status */}
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <LBL>Status</LBL>
        <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {Object.entries(SC).map(([k,v])=><button key={k} className="tap" onClick={()=>onUpdateTask({...task,status:k})} style={{padding:"4px 10px",borderRadius:15,border:"1px solid "+(task.status===k?v.color+"88":C.border2),background:task.status===k?v.color+"18":"transparent",color:task.status===k?v.color:C.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>{v.label}</button>)}
        </div>
      </div>
      {/* Priority */}
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <LBL>Priority</LBL>
        <div style={{display:"flex",gap:5}}>
          {[["high","🚩 Urgent",C.red],["medium","▶ Normal",C.blue],["low","↓ Low",C.muted]].map(([k,lbl,col])=><button key={k} className="tap" onClick={()=>onUpdateTask({...task,priority:k})} style={{padding:"4px 10px",borderRadius:15,border:"1px solid "+(task.priority===k?col+"88":C.border2),background:task.priority===k?col+"18":"transparent",color:task.priority===k?col:C.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>{lbl}</button>)}
        </div>
      </div>
      {/* Due date */}
      <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
        <LBL>Due</LBL>
        <div style={{flex:1}}><DueDatePicker value={task.dueDate||""} onChange={v=>onUpdateTask({...task,dueDate:v})}/></div>
      </div>
      {/* Assignees */}
      {pool.length>0&&<div style={{display:"flex",alignItems:"flex-start",gap:8}}>
