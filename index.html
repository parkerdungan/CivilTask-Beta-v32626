        <div style={{padding:"8px 13px",background:C.bgDeep,borderBottom:"1px solid "+C.border2,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,fontWeight:700,color:"#4a5568",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,textTransform:"uppercase"}}>Archived Projects</span>
          <span style={{fontSize:11,color:C.dim,background:C.bgTrack,borderRadius:10,padding:"1px 7px"}}>{allCoProjects.filter(p=>p.projectStatus==="archive").length}</span>
        </div>
        {allCoProjects.filter(p=>p.projectStatus==="archive").map(p=>{const co2=companies.find(c=>c.id===p.companyId);const pt=tasks.filter(t=>t.projectId===p.id);return(<div key={p.id} style={{display:"flex",alignItems:"center",padding:"9px 13px",borderBottom:"1px solid "+C.border2,gap:10}}><ProjNum num={p.projectNumber}/><span style={{flex:1,fontSize:13,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>{co2&&<span style={{fontSize:11,color:co2.color,flexShrink:0}}>{co2.short}</span>}<span style={{fontSize:11,color:C.dim,flexShrink:0}}>{pt.length}t</span><button className="tap" onClick={()=>onSelectProject(p.id)} style={{background:"none",border:"1px solid "+C.border,borderRadius:8,color:C.muted,fontSize:11,padding:"4px 10px",cursor:"pointer",flexShrink:0}}>Open</button></div>);})}
      </div>
    )}
    {confirmP&&<Confirm message="Delete project and all its tasks?" onYes={()=>{onDelProject(confirmP);setConfirmP(null);}} onNo={()=>setConfirmP(null)}/>}
    {addTaskProj&&<TaskSheet task={null} projectId={addTaskProj} members={members} projects={projects} teams={teams} onClose={()=>setAddTaskProj(null)} onSave={data=>{onAddTask(data);setAddTaskProj(null);}}/>}
    {taskSheet&&<TaskSheet task={taskSheet} projectId={taskSheet.projectId} members={members} projects={projects} teams={teams} onClose={()=>setTaskSheet(null)} onSave={data=>{onUpdateTask({...taskSheet,...data});setTaskSheet(null);}}/>}
    {showAdd&&<Sheet title="New Project" onClose={()=>setShowAdd(false)}>
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <FF label="Firm *"><select value={form.companyId} onChange={e=>setForm(f=>({...f,companyId:e.target.value,teamId:"",assigneeIds:[],principalInCharge:"",projectManager:""}))}><option value="">— Select firm —</option>{companies.map(co=><option key={co.id} value={co.id}>{co.name}</option>)}</select></FF>
        <FF label="Project Name *"><input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. New Augusta Water Line"/></FF>
        <FF label="Project Number"><input value={form.projectNumber||""} onChange={e=>setForm(f=>({...f,projectNumber:e.target.value}))} placeholder="e.g. 94082001 (auto-generated if blank)"/></FF>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <FF label="Phase"><select value={form.projectStatus} onChange={e=>setForm(f=>({...f,projectStatus:e.target.value}))}>{Object.entries(PROJ_STATUS).filter(([k])=>k!=="archive").map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></FF>
          <FF label="Team"><select value={form.teamId} onChange={e=>setForm(f=>({...f,teamId:e.target.value,assigneeIds:[],teamMemberIds:[],projectManager:""}))}><option value="">— Select team —</option>{(form.companyId?teams.filter(t=>t.companyId===form.companyId):teams).map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</select></FF>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <FF label="Principal in Charge"><select value={form.principalInCharge||""} onChange={e=>setForm(f=>({...f,principalInCharge:e.target.value}))}><option value="">— Select —</option>{members.filter(m=>m.isPrincipal).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></FF>
          <FF label="Project Manager">
            <select value={form.projectManager||""} onChange={e=>setForm(f=>({...f,projectManager:e.target.value}))}>
              <option value="">— Select —</option>
              {(form.teamId
                ? members.filter(m=>m.teamId===form.teamId)
                : form.companyId
                  ? members.filter(m=>m.companyId===form.companyId)
                  : []
              ).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
            </select>
            {!form.teamId&&form.companyId&&<div style={{fontSize:11,color:C.dim,marginTop:3}}>Select a team to narrow this list</div>}
          </FF>
        </div>
        <FF label="Team Members">
          {(()=>{
            const pool=form.teamId
              ? members.filter(m=>m.teamId===form.teamId)
              : form.companyId
                ? members.filter(m=>m.companyId===form.companyId)
                : [];
            if(!form.companyId) return <div style={{fontSize:12,color:C.dim,padding:"4px 0"}}>Select a firm first</div>;
            if(!form.teamId&&pool.length>0) return(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <div style={{fontSize:12,color:C.muted,padding:"6px 10px",background:C.bgTrack,borderRadius:8,display:"flex",alignItems:"center",gap:7}}>
                  <Icon name="users" size={13}/>Select a team above to see its members here
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                  {pool.map(m=>{const active=(form.teamMemberIds||[]).includes(m.id);const mt=teams.find(t=>t.id===m.teamId);const col=mt?mt.color:C.blue;return(<button key={m.id} className="tap" onClick={()=>setForm(f=>{const ids=f.teamMemberIds||[];return{...f,teamMemberIds:ids.includes(m.id)?ids.filter(x=>x!==m.id):[...ids,m.id]};})} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 11px",borderRadius:20,border:"1.5px solid "+(active?col+"88":C.border),background:active?col+"15":"transparent",color:active?col:C.muted,cursor:"pointer",fontSize:12,fontWeight:600,opacity:0.6}}><Av initials={m.avatar} color={col} size={20}/>{m.name.split(" ")[0]}{active&&<span style={{fontSize:10,color:C.green}}>✓</span>}</button>);})}
                </div>
              </div>
            );
            if(!pool.length) return <div style={{fontSize:12,color:C.dim,padding:"4px 0"}}>No members in this team yet</div>;
            return(
              <div style={{display:"flex",flexWrap:"wrap",gap:7,padding:"2px 0"}}>
                {pool.map(m=>{const active=(form.teamMemberIds||[]).includes(m.id);const mt=teams.find(t=>t.id===m.teamId);const col=mt?mt.color:C.blue;return(<button key={m.id} className="tap" onClick={()=>setForm(f=>{const ids=f.teamMemberIds||[];return{...f,teamMemberIds:ids.includes(m.id)?ids.filter(x=>x!==m.id):[...ids,m.id]};})} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 11px",borderRadius:20,border:"1.5px solid "+(active?col+"88":C.border),background:active?col+"15":"transparent",color:active?col:C.muted,cursor:"pointer",fontSize:12,fontWeight:600,transition:"all 0.12s"}}><Av initials={m.avatar} color={col} size={20}/>{m.name.split(" ")[0]}{active&&<span style={{fontSize:10,color:C.green}}>✓</span>}</button>);})}
              </div>
            );
          })()}
        </FF>
        <FF label="Description"><textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Brief overview…" style={{minHeight:64,resize:"none"}}/></FF>
        <div style={{display:"flex",gap:10}}><Btn onClick={()=>setShowAdd(false)} ghost>Cancel</Btn><Btn onClick={submit} full>Create Project</Btn></div>
      </div>
    </Sheet>}
  </div>);
}


// ── PROJECT DETAIL VIEW ───────────────────────────────────────────────────────
function ProjectDetailView({project,tasks,members,teams,companies,projects,onBack,onUpdateTask,onAddTask,onDelTask,onUpdateProject,canEdit}){
  const [taskSheet,setTaskSheet]=useState(null);
  const [schedSheet,setSchedSheet]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [editProj,setEditProj]=useState(false);
  const team=teams.find(t=>t.id===project.teamId);
  const co=companies?companies.find(c=>c.id===project.companyId):null;
  const ptasks=tasks.filter(t=>t.projectId===project.id);
  const done=ptasks.filter(t=>t.status==="done").length;
  const pct=ptasks.length?Math.round(done/ptasks.length*100):0;
  const ps=PROJ_STATUS[project.projectStatus||"construction"];
  const projAssignees=(project.assigneeIds||[]).map(id=>members.find(m=>m.id===id)).filter(Boolean);

  const ColHdr=()=><div style={{display:"flex",alignItems:"center",padding:"5px 12px",borderBottom:"1px solid "+C.border2,background:C.bgDeep}}>
    <div style={{width:26,flexShrink:0}}/><div style={{flex:1,fontSize:10,letterSpacing:2,textTransform:"uppercase",color:C.dim,fontFamily:"'Barlow Condensed',sans-serif"}}>Task Name</div>
    <div style={{width:34,textAlign:"center",fontSize:10,letterSpacing:1,color:C.dim,fontFamily:"'Barlow Condensed',sans-serif"}}>Who</div>
    <div style={{width:120,textAlign:"center",fontSize:10,letterSpacing:1,color:C.dim,fontFamily:"'Barlow Condensed',sans-serif"}}>Due Date</div>
    <div style={{width:30,textAlign:"center",fontSize:10,color:C.dim}}>Pri</div>
  </div>;

  const TaskRow=({task})=>{
    const sc=SC[task.status];const taskAIds=task.assigneeIds||(task.assigneeId?[task.assigneeId]:[]);const m=members.find(x=>taskAIds.includes(x.id));const mt=m?teams.find(t=>t.id===m.teamId):null;const od=isOverdue(task);const sub=(task.subtasks||[]).filter(s=>s.done).length;
    return(<div style={{borderBottom:"1px solid "+C.border2}}>
      <div className="rt" onClick={()=>setTaskSheet(task)} style={{display:"flex",alignItems:"center",padding:"9px 12px",cursor:"pointer"}}>
        <div style={{width:26,display:"flex",justifyContent:"center",flexShrink:0}}>
          <div onClick={e=>{e.stopPropagation();onUpdateTask({...task,status:task.status==="done"?"todo":"done"});}} style={{width:17,height:17,borderRadius:"50%",border:"2px solid "+sc.color,background:task.status==="done"?sc.color:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>{task.status==="done"&&<Icon name="check" size={9}/>}</div>
        </div>
        <div style={{flex:1,minWidth:0,marginRight:6}}>
          <div style={{fontSize:13,fontWeight:500,color:od?C.red:task.status==="done"?C.dim:C.text,textDecoration:task.status==="done"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.title}</div>
          {(task.subtasks||[]).length>0&&<div style={{fontSize:10,color:C.dim,marginTop:2}}>☐ {sub}/{task.subtasks.length}</div>}
        </div>
        <div style={{width:34,display:"flex",justifyContent:"center",flexShrink:0}}>{m?<Av initials={m.avatar} color={mt?mt.color:C.blue} size={24}/>:<span style={{color:C.border,fontSize:18}}>◯</span>}</div>
        <div style={{width:120,display:"flex",justifyContent:"center",flexShrink:0}} onClick={e=>e.stopPropagation()}>
          <DueDatePicker value={task.dueDate||""} onChange={v=>onUpdateTask({...task,dueDate:v})}/>
        </div>
        <div style={{width:30,display:"flex",justifyContent:"center",flexShrink:0}}><FlagIcon priority={task.priority}/></div>
      </div>
      <div style={{display:"flex",padding:"0 12px 5px 38px",gap:14}}>
        <button className="tap" onClick={()=>setSchedSheet(task)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",gap:3,padding:"1px 0"}}><Icon name="flag" size={11}/>Edit priority</button>
        <button className="tap" onClick={()=>setConfirm(task.id)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",gap:3,padding:"1px 0"}}><Icon name="trash" size={11}/>Delete</button>
      </div>
    </div>);
  };

  const grouped=Object.entries(SC).map(([k,sc])=>({k,sc,t:ptasks.filter(t=>t.status===k)})).filter(g=>g.t.length);

  return(<div style={{display:"flex",flexDirection:"column",gap:14}}>
    <button className="tap" onClick={onBack} style={{display:"flex",alignItems:"center",gap:5,background:"none",border:"none",color:C.muted,cursor:"pointer",padding:"4px 0",fontSize:14}}><Icon name="back" size={17}/>Projects</button>

    {/* Project header card */}
    <div style={{background:C.bg1,border:"1px solid "+C.border,borderRadius:13,padding:"14px 15px"}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,flexWrap:"wrap"}}>
            <ProjNum num={project.projectNumber}/>
            {ps&&<Pill color={ps.color} bg={ps.bg} small>{ps.label}</Pill>}
            {co&&<Pill color={co.color} bg={co.color+"15"} small>{co.short}</Pill>}
          </div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:21,color:C.heading}}>{project.name}</div>
          {team&&<div style={{fontSize:12,marginTop:2}}><span style={{color:team.color}}>●</span><span style={{color:C.muted,marginLeft:4}}>{team.name}</span></div>}
          {project.description&&<div style={{fontSize:13,color:"#5a7a95",marginTop:5,lineHeight:1.5}}>{project.description}</div>}
          {(project.principalInCharge||project.projectManager)&&<div style={{fontSize:12,color:C.muted,marginTop:5,display:"flex",gap:12,flexWrap:"wrap"}}>{project.principalInCharge&&<span><span style={{color:C.dim}}>Principal: </span>{(()=>{const m=members.find(x=>x.id===project.principalInCharge);return m?m.name:project.principalInCharge;})()}</span>}{project.projectManager&&<span><span style={{color:C.dim}}>PM: </span>{(()=>{const m=members.find(x=>x.id===project.projectManager);return m?m.name:project.projectManager;})()}</span>}</div>}
          {/* Project assignee avatars */}
          {projAssignees.length>0&&<div style={{display:"flex",alignItems:"center",gap:8,marginTop:8,flexWrap:"wrap"}}>
            <span style={{fontSize:11,color:C.dim,letterSpacing:0.5}}>Assigned:</span>
            <div style={{display:"flex",gap:-4}}>
              {projAssignees.map((m,i)=>{const mt=teams.find(t=>t.id===m.teamId);return <div key={m.id} style={{marginLeft:i>0?-6:0,zIndex:projAssignees.length-i}}><Av initials={m.avatar} color={mt?mt.color:C.blue} size={24}/></div>;})}
            </div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {projAssignees.map(m=><span key={m.id} style={{fontSize:11,color:C.muted}}>{m.name.split(" ")[0]}</span>).reduce((a,b)=>[...a,<span key={b.key+"d"} style={{color:C.dim}}>·</span>,b],[])}
            </div>
          </div>}
        </div>
        {(canEdit!==false)&&<button className="tap" onClick={()=>setEditProj(true)}
          style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,padding:"8px 12px",background:"rgba(74,158,202,0.08)",border:"1px solid rgba(74,158,202,0.25)",borderRadius:9,color:C.blue,fontSize:12,fontWeight:600,cursor:"pointer"}}>
          <Icon name="edit" size={14}/>Edit
        </button>}
      </div>
      <div style={{marginTop:11,display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1,height:5,background:C.bgTrack,borderRadius:3}}><div style={{height:"100%",width:pct+"%",background:pct===100?C.green:C.gold,borderRadius:3}}/></div>
        <span style={{fontSize:12,color:C.muted}}>{done}/{ptasks.length} · {pct}%</span>
      </div>
    </div>

    {(canEdit!==false)&&<button className="tap" onClick={()=>setTaskSheet("new")} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"11px",background:"rgba(232,160,32,0.08)",border:"1px solid rgba(232,160,32,0.25)",borderRadius:10,color:C.gold,fontSize:14,fontWeight:600,cursor:"pointer"}}><Icon name="plus" size={15}/>New Task</button>}
    {!ptasks.length&&<div style={{textAlign:"center",color:C.dim,padding:"28px 0",fontSize:13}}>No tasks yet</div>}
    {grouped.map(({k,sc,t})=><div key={k} style={{background:C.bg2,border:"1px solid "+C.border,borderRadius:11,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",gap:9,padding:"9px 13px",background:C.bgDeep,borderBottom:"1px solid "+C.border2}}>
        <div style={{width:9,height:9,borderRadius:"50%",background:sc.color,flexShrink:0}}/><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:12,letterSpacing:1,color:sc.color,textTransform:"uppercase"}}>{sc.label}</span><span style={{fontSize:12,color:C.dim,background:C.bgTrack,borderRadius:10,padding:"1px 7px"}}>{t.length}</span>
      </div>
      <ColHdr/>{t.map(task=><TaskRow key={task.id} task={task}/>)}
    </div>)}

    {confirm&&<Confirm message="Delete this task?" onYes={()=>{onDelTask(confirm);setConfirm(null);}} onNo={()=>setConfirm(null)}/>}
    {schedSheet&&<SchedSheet task={schedSheet} projects={projects} onSave={t=>{onUpdateTask(t);setSchedSheet(null);}} onClose={()=>setSchedSheet(null)}/>}
    {taskSheet&&<TaskSheet task={taskSheet==="new"?null:taskSheet} projectId={project.id} members={members} projects={projects} teams={teams} onClose={()=>setTaskSheet(null)} onSave={data=>{if(taskSheet==="new")onAddTask(data);else onUpdateTask({...taskSheet,...data});}}/>}
    {editProj&&<ProjectSheet project={project} teams={teams} companies={companies||[]} members={members} onClose={()=>setEditProj(false)} onSave={(updated)=>{onUpdateProject(updated);setEditProj(false);}}/>}
  </div>);
}

// ── PROJECT SHEET (edit all project fields) ────────────────────────────────────
function ProjectSheet({project,teams,companies,members,onClose,onSave}){
  const [form,setForm]=useState({
    name:project.name||"",
    projectNumber:project.projectNumber||"",
    projectStatus:project.projectStatus||"construction",
    companyId:project.companyId||"",
    teamId:project.teamId||"",
    description:project.description||"",
    principalInCharge:project.principalInCharge||"",
    projectManager:project.projectManager||"",

      <FF label="Project Number">
        <input value={form.projectNumber} onChange={e=>setForm(f=>({...f,projectNumber:e.target.value}))} placeholder="e.g. 94082001"/>
      </FF>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <FF label="Phase">
          <select value={form.projectStatus} onChange={e=>setForm(f=>({...f,projectStatus:e.target.value}))}>
            {Object.entries(PROJ_STATUS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
          {form.projectStatus==="archive"&&<div style={{fontSize:11,color:"#4a5568",marginTop:4,padding:"6px 10px",background:"#1a1e28",borderRadius:7,border:"1px solid #2a3040"}}>This project will be hidden from all views but kept in the database. You can restore it anytime by changing the phase.</div>}
        </FF>
        <FF label="Department">
          <select value={form.teamId} onChange={e=>setForm(f=>({...f,teamId:e.target.value,assigneeIds:[]}))}>
            <option value="">— None —</option>
            {availTeams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}

          ?<div style={{fontSize:12,color:C.dim,padding:"8px 0"}}>No members yet — add staff in the <strong style={{color:C.muted}}>Teams</strong> tab first.</div>
          :<div style={{display:"flex",flexWrap:"wrap",gap:7,padding:"4px 0"}}>
            {teamMembers.map(m=>{
              const active=(form.assigneeIds||[]).includes(m.id);
              const mt=teams.find(t=>t.id===m.teamId);

                style={{display:"flex",alignItems:"center",gap:6,padding:"6px 11px",borderRadius:20,border:"1.5px solid "+(active?(mt?mt.color:C.blue)+"88":C.border),background:active?(mt?mt.color:C.blue)+"15":"transparent",color:active?(mt?mt.color:C.blue):C.muted,cursor:"pointer",fontSize:12,fontWeight:600,transition:"all 0.12s"}}>
                <Av initials={m.avatar} color={mt?mt.color:C.blue} size={20}/>
                {m.name.split(" ")[0]}
                {active&&<span style={{fontSize:10,color:C.green}}>✓</span>}
              </button>);
            })}
          </div>
        }
      </FF>

      <FF label="Team Members">
        {(()=>{
          const pool=form.companyId?members.filter(m=>m.companyId===form.companyId):members;

              const active=(form.teamMemberIds||[]).includes(m.id);
              const mt=teams.find(t=>t.id===m.teamId);

                <Av initials={m.avatar} color={mt?mt.color:C.blue} size={20}/>
                {m.name.split(" ")[0]}
                {active&&<span style={{fontSize:10,color:C.green}}>✓</span>}
              </button>);
            })}
          </div>;
        })()}
      </FF>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <FF label="Principal in Charge"><select value={form.principalInCharge||""} onChange={e=>setForm(f=>({...f,principalInCharge:e.target.value}))}><option value="">— Select —</option>{members.filter(m=>m.isPrincipal&&(!form.companyId||m.companyId===form.companyId||["c1","c2","c3","c4","c5","c6"].includes(m.companyId))).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></FF>
        <FF label="Project Manager"><select value={form.projectManager||""} onChange={e=>setForm(f=>({...f,projectManager:e.target.value}))}><option value="">— Select —</option>{(form.companyId?members.filter(m=>m.companyId===form.companyId):members).map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></FF>
      </div>
      <div style={{display:"flex",gap:10}}>

}

// ── TASK LIST VIEW — grouped by department, then time within each ─────────────
function TaskListView({tasks,projects,members,teams,companies,selCompany,setSelCompany,session,onUpdateTask,batchUpTask}){
  const [taskSheet,setTaskSheet]=useState(null);
  const [schedSheet,setSchedSheet]=useState(null);
  const [collapsed,setCollapsed]=useState({done:true});
  const [search,setSearch]=useState("");
  const [filterMember,setFilterMember]=useState("all");
  const [filterPriority,setFilterPriority]=useState("all");
  const [filterStatus,setFilterStatus]=useState("all");
  const [filterProject,setFilterProject]=useState("all");
  const [showFilters,setShowFilters]=useState(false);
  const isAdmin=session&&session.role==="admin";

  const getTaskAssigneeIds=(task)=>task.assigneeIds||(task.assigneeId?[task.assigneeId]:[]);

  const deptFiltered=useMemo(()=>{
    if(selCompany==="all") return tasks;
    const mIds=new Set(members.filter(m=>m.companyId===selCompany).map(m=>m.id));
    const pIds=new Set(projects.filter(p=>p.companyId===selCompany).map(p=>p.id));
    return tasks.filter(t=>pIds.has(t.projectId)||getTaskAssigneeIds(t).some(id=>mIds.has(id)));
  },[tasks,selCompany,members,projects]);

  const filteredMembers=selCompany==="all"?members:members.filter(m=>m.companyId===selCompany);
  const allCoProjects=selCompany==="all"?projects:projects.filter(p=>p.companyId===selCompany);
  const filteredProjects=allCoProjects.filter(p=>p.projectStatus!=="archive");

  const base=useMemo(()=>{
    return deptFiltered.filter(t=>{
      if(filterMember!=="all"&&!getTaskAssigneeIds(t).includes(filterMember))return false;
      if(filterPriority!=="all"&&t.priority!==filterPriority)return false;
      if(filterStatus!=="all"&&t.status!==filterStatus)return false;
      if(filterProject!=="all"&&t.projectId!==filterProject)return false;
      if(search){
        const q=search.toLowerCase();
        const proj=projects.find(p=>p.id===t.projectId);
        if(!(t.title.toLowerCase().includes(q)||(proj&&(proj.name.toLowerCase().includes(q)||proj.projectNumber.toLowerCase().includes(q)))))return false;
      }
      return true;
    });
  },[deptFiltered,filterMember,filterPriority,filterStatus,filterProject,search,projects]);

  const activeFilters=(filterMember!=="all"?1:0)+(filterPriority!=="all"?1:0)+(filterStatus!=="all"?1:0)+(filterProject!=="all"?1:0)+(search?1:0);

  const active=base.filter(t=>t.status!=="done");
  const doneItems=base.filter(t=>t.status==="done");
  const grouped=useMemo(()=>{
    const g={overdue:[],today:[],tomorrow:[],thisweek:[],later:[],done:[]};
    active.forEach(t=>{const grp=taskTimeGroup(t);if(g[grp])g[grp].push(t);});
    g.done=doneItems;return g;
  },[active,doneItems]);
  const toggle=(id)=>setCollapsed(c=>({...c,[id]:!c[id]}));

  const AssigneeAvatars=({ids})=>{
    const assignees=(ids||[]).map(id=>members.find(m=>m.id===id)).filter(Boolean);
    if(!assignees.length)return <span style={{color:C.border,fontSize:18}}>◯</span>;
    return(<div style={{display:"flex"}}>
      {assignees.slice(0,3).map((m,i)=>{const mt=teams.find(t=>t.id===m.teamId);return <div key={m.id} style={{marginLeft:i>0?-8:0}}><Av initials={m.avatar} color={mt?mt.color:C.blue} size={22}/></div>;})}
      {assignees.length>3&&<div style={{marginLeft:-8,width:22,height:22,borderRadius:"50%",background:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:C.muted}}>+{assignees.length-3}</div>}
    </div>);
  };

  const ColHdr=()=><div style={{display:"flex",alignItems:"center",padding:"5px 12px",borderBottom:"1px solid "+C.border2,background:C.bgDeep}}>
    <div style={{width:26,flexShrink:0}}/>
    <div style={{flex:1,fontSize:10,letterSpacing:2,textTransform:"uppercase",color:C.dim,fontFamily:"'Barlow Condensed',sans-serif"}}>Task Name</div>
    <div style={{width:46,textAlign:"center",fontSize:10,letterSpacing:1,color:C.dim,fontFamily:"'Barlow Condensed',sans-serif"}}>Who</div>
    <div style={{width:120,textAlign:"center",fontSize:10,letterSpacing:1,color:C.dim,fontFamily:"'Barlow Condensed',sans-serif"}}>Due Date</div>
    <div style={{width:26}}/>
  </div>;

  const TaskRow=({task})=>{
    const proj=projects.find(p=>p.id===task.projectId);
    const taskIds=getTaskAssigneeIds(task);
    const od=isOverdue(task);const sc=SC[task.status];
    return(<div style={{borderBottom:"1px solid "+C.border2}}>
      <div className="rt" onClick={()=>setTaskSheet(task)} style={{display:"flex",alignItems:"center",padding:"9px 12px",cursor:"pointer"}}>
        <div style={{width:26,display:"flex",justifyContent:"center",flexShrink:0}}>
          <div onClick={e=>{e.stopPropagation();onUpdateTask({...task,status:task.status==="done"?"todo":"done"});}}
            style={{width:17,height:17,borderRadius:"50%",border:"2px solid "+sc.color,background:task.status==="done"?sc.color:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            {task.status==="done"&&<Icon name="check" size={9}/>}
          </div>
        </div>
        <div style={{flex:1,minWidth:0,marginRight:6}}>
          {proj&&<div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
            <span style={{fontSize:10,color:C.dim,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:0.5}}>{proj.projectNumber}</span>
            <span style={{fontSize:10,color:C.dim}}>· {proj.name.length>28?proj.name.slice(0,28)+"…":proj.name}</span>
          </div>}
          <div style={{fontSize:13,fontWeight:500,color:od?C.red:task.status==="done"?C.dim:C.text,textDecoration:task.status==="done"?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.title}</div>
        </div>
        <div style={{width:46,display:"flex",justifyContent:"center",flexShrink:0}}><AssigneeAvatars ids={taskIds}/></div>
        <div style={{width:120,display:"flex",justifyContent:"center",flexShrink:0}} onClick={e=>e.stopPropagation()}>
          <DueDatePicker value={task.dueDate||""} onChange={v=>onUpdateTask({...task,dueDate:v})}/>
        </div>
        <div style={{width:26,display:"flex",justifyContent:"center",flexShrink:0}}><FlagIcon priority={task.priority}/></div>
      </div>
      <div style={{padding:"0 12px 5px 38px"}}>
        <button className="tap" onClick={()=>setSchedSheet(task)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:11,display:"flex",alignItems:"center",gap:3,padding:"1px 0"}}>
          <Icon name="flag" size={11}/>Edit priority
        </button>
      </div>
    </div>);
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
    <CompanySwitcher companies={companies} selCompany={selCompany} setSelCompany={setSelCompany}/>
    {/* Search + filter bar */}
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{flex:1,position:"relative"}}>
          <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:C.dim,pointerEvents:"none"}}><Icon name="search" size={14}/></span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search tasks, project name or number…" style={{paddingLeft:34,fontSize:13}}/>
        </div>
        <button className="tap" onClick={()=>setShowFilters(v=>!v)}
          style={{flexShrink:0,display:"flex",alignItems:"center",gap:5,padding:"10px 13px",borderRadius:9,border:"1px solid "+(showFilters||activeFilters>0?C.blue:C.border),background:showFilters||activeFilters>0?"rgba(74,158,202,0.1)":"transparent",color:activeFilters>0?C.blue:C.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>
          <Icon name="hash" size={13}/>Filters{activeFilters>0&&<span style={{background:C.blue,color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700}}>{activeFilters}</span>}
        </button>
      </div>
      {showFilters&&<div style={{display:"flex",gap:8,flexWrap:"wrap",padding:"10px 12px",background:C.bg1,borderRadius:10,border:"1px solid "+C.border}}>
        <div style={{display:"flex",flexDirection:"column",gap:4,flex:1,minWidth:120}}>
          <div style={{fontSize:10,color:C.dim,letterSpacing:1,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>Assignee</div>
          <select value={filterMember} onChange={e=>setFilterMember(e.target.value)} style={{fontSize:12,padding:"6px 10px"}}>
            <option value="all">All Assignees</option>
            {filteredMembers.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
          </select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,flex:1,minWidth:100}}>
          <div style={{fontSize:10,color:C.dim,letterSpacing:1,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>Priority</div>
          <select value={filterPriority} onChange={e=>setFilterPriority(e.target.value)} style={{fontSize:12,padding:"6px 10px"}}>
            <option value="all">All Priorities</option>
            <option value="high">Urgent</option>
            <option value="medium">Normal</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,flex:1,minWidth:100}}>
          <div style={{fontSize:10,color:C.dim,letterSpacing:1,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>Phase</div>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{fontSize:12,padding:"6px 10px"}}>
            <option value="all">All Statuses</option>
            {Object.entries(SC).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,flex:1,minWidth:130}}>
          <div style={{fontSize:10,color:C.dim,letterSpacing:1,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>Project</div>
          <select value={filterProject} onChange={e=>setFilterProject(e.target.value)} style={{fontSize:12,padding:"6px 10px"}}>
            <option value="all">All Projects</option>
            {filteredProjects.map(p=><option key={p.id} value={p.id}>{p.projectNumber&&p.projectNumber!=="00000000"?p.projectNumber+" · ":""}{p.name.length>25?p.name.slice(0,25)+"…":p.name}</option>)}
          </select>
        </div>
        {activeFilters>0&&<button className="tap" onClick={()=>{setFilterMember("all");setFilterPriority("all");setFilterStatus("all");setFilterProject("all");setSearch("");}} style={{alignSelf:"flex-end",padding:"6px 11px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.muted,fontSize:12,cursor:"pointer"}}>✕ Clear All</button>}
      </div>}
    </div>
    {TIME_GROUPS.map(({id,label,color})=>{
      const grpTasks=grouped[id]||[];if(!grpTasks.length)return null;
      const isCol=collapsed[id];
      return(<div key={id} style={{background:C.bg2,border:"1px solid "+(id==="overdue"?C.red+"44":C.border),borderRadius:11,overflow:"hidden"}}>
        <div className="rt" onClick={()=>toggle(id)} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 13px",background:C.bgDeep,cursor:"pointer",borderBottom:isCol?"none":"1px solid "+C.border2}}>
          <div style={{color:C.muted,transition:"transform 0.14s",transform:isCol?"rotate(0deg)":"rotate(90deg)"}}><Icon name="chev" size={13}/></div>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,color,letterSpacing:0.5}}>{label}</span>
          <span style={{fontSize:13,color:C.muted,fontWeight:600,background:C.bgTrack,borderRadius:10,padding:"1px 8px"}}>{grpTasks.length}</span>
          {id==="overdue"&&<button className="tap" onClick={e=>{
            e.stopPropagation();
            const td=new Date().toISOString().slice(0,10);
            if(batchUpTask){batchUpTask(grpTasks.map(t=>({...t,dueDate:td})));}
            else{grpTasks.forEach(t=>onUpdateTask({...t,dueDate:td}));}
          }} style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5,padding:"5px 12px",
            borderRadius:8,border:"1px solid "+C.red+"55",background:C.red+"12",
            color:C.red,cursor:"pointer",fontSize:11,fontWeight:700,
            fontFamily:"'Barlow Condensed',sans-serif",flexShrink:0}}>
            <Icon name="cal" size={12}/>Reschedule All → Today
          </button>}
        </div>
        {!isCol&&<div className="expand"><ColHdr/>{grpTasks.map(t=><TaskRow key={t.id} task={t}/>)}</div>}
      </div>);
    })}
    {base.length===0&&<div style={{textAlign:"center",color:C.dim,padding:"36px 0",fontSize:14}}>{activeFilters>0?"No tasks match your filters":"No tasks found"}</div>}
    {schedSheet&&<SchedSheet task={schedSheet} projects={projects} onSave={t=>{onUpdateTask(t);setSchedSheet(null);}} onClose={()=>setSchedSheet(null)}/>}
    {taskSheet&&<TaskSheet task={taskSheet} projectId={taskSheet.projectId} members={members} projects={projects} teams={teams} onClose={()=>setTaskSheet(null)} onSave={data=>{onUpdateTask({...taskSheet,...data});setTaskSheet(null);}}/>}
  </div>);
}

function TeamsView({teams,members,tasks,projects,companies,selCompany,setSelCompany,setTeams,setMembers}){
  // If a team is selected via the switcher, start on that tab
  const visibleTeams=selCompany==="all"?teams:teams.filter(t=>t.companyId===selCompany);
  const [sel,setSel]=useState(visibleTeams[0]?visibleTeams[0].id:null);
  React.useEffect(()=>{
    const vt=selCompany==="all"?teams:teams.filter(t=>t.companyId===selCompany);
    if(vt.length&&!vt.find(t=>t.id===sel))setSel(vt[0].id);
  },[selCompany,teams]);
  const [ts,setTs]=useState(null);const [ms,setMs]=useState(null);const [cT,setCT]=useState(null);const [cM,setCM]=useState(null);
  const team=teams.find(t=>t.id===sel);const tm=members.filter(m=>m.teamId===sel);
  const saveT=(next)=>{setTeams(next);window.fbSet('teams',next);};const saveM=(next)=>{setMembers(next);window.fbSet('members',next);};

  function TeamSh({et,onClose}){
    const mi=et?members.filter(m=>m.teamId===et.id):[];
    const defaultCoId=et?et.companyId:(selCompany!=="all"?selCompany:"");
    const [f,setF]=useState(et?{name:et.name,color:et.color,leader:et.leader||"",companyId:et.companyId||""}:{name:"",color:TEAM_COLORS[teams.length%TEAM_COLORS.length],leader:"",companyId:defaultCoId});
    const save=()=>{
      if(!f.name.trim())return;
      if(et){saveT(teams.map(t=>t.id===et.id?{...t,...f}:t));}
      else{const n={id:"t"+uid(),name:f.name.trim(),color:f.color,leader:f.leader||null,companyId:f.companyId||null};saveT([...teams,n]);setSel(n.id);}
      onClose();
    };
    return(<Sheet title={et?"Edit Team":"New Team"} onClose={onClose}><div style={{display:"flex",flexDirection:"column",gap:16}}>
      {!et&&<FF label="Firm *"><select value={f.companyId} onChange={e=>setF(x=>({...x,companyId:e.target.value}))}><option value="">— Select firm —</option>{companies.map(co=><option key={co.id} value={co.id}>{co.name}</option>)}</select></FF>}
      <FF label="Team Name *"><input value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))} placeholder="e.g. Survey Crew A"/></FF>
      <FF label="Team Colour"><div style={{display:"flex",flexWrap:"wrap",gap:9,padding:"3px 0"}}>{TEAM_COLORS.map(col=><button key={col} className="tap" onClick={()=>setF(x=>({...x,color:col}))} style={{width:34,height:34,borderRadius:"50%",background:col,border:f.color===col?"3px solid white":"3px solid transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"white"}}>{f.color===col&&<Icon name="check" size={15}/>}</button>)}</div></FF>
      {et&&mi.length>0&&<FF label="Team Leader"><select value={f.leader} onChange={e=>setF(x=>({...x,leader:e.target.value}))}><option value="">— No leader —</option>{mi.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></FF>}
      <div style={{display:"flex",gap:10}}><Btn onClick={onClose} ghost>Cancel</Btn><Btn onClick={save} full>{et?"Save":"Create Team"}</Btn></div>
    </div></Sheet>);
  }
  function MemberSh({em,tid,onClose}){
    const defaultCoId=em?em.companyId:(tid?teams.find(t=>t.id===tid)?.companyId||"":"");
    const [f,setF]=useState(em?{name:em.name,role:em.role,teamId:em.teamId,companyId:em.companyId||""}:{name:"",role:"",teamId:tid||"",companyId:defaultCoId});
    const availTeams=f.companyId?teams.filter(t=>t.companyId===f.companyId):teams;
    const save=()=>{
      if(!f.name.trim())return;
      const ini=mkInitials(f.name);
      const coId=f.companyId||(f.teamId?teams.find(t=>t.id===f.teamId)?.companyId||null:null);
      if(em){saveM(members.map(m=>m.id===em.id?{...m,...f,avatar:ini,companyId:coId}:m));}
      else saveM([...members,{id:"m"+uid(),name:f.name.trim(),role:f.role,teamId:f.teamId,avatar:ini,companyId:coId}]);
      onClose();
    };
    return(<Sheet title={em?"Edit Member":"Add Member"} onClose={onClose}><div style={{display:"flex",flexDirection:"column",gap:16}}>
      <FF label="Firm *">
        <select value={f.companyId} onChange={e=>setF(x=>({...x,companyId:e.target.value,teamId:""}))}>
          <option value="">— Select firm —</option>
          {companies.map(co=><option key={co.id} value={co.id}>{co.name}</option>)}
        </select>
      </FF>
      <FF label="Full Name *"><input value={f.name} onChange={e=>setF(x=>({...x,name:e.target.value}))} placeholder="e.g. Chris Landry"/></FF>
      <FF label="Role / Title"><input value={f.role} onChange={e=>setF(x=>({...x,role:e.target.value}))} placeholder="e.g. Survey Crew Chief"/></FF>
      <FF label="Department / Team">
        <select value={f.teamId} onChange={e=>setF(x=>({...x,teamId:e.target.value}))}>
          <option value="">— Select team —</option>
          {availTeams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
        </select>
      </FF>
      <div style={{display:"flex",gap:10}}><Btn onClick={onClose} ghost>Cancel</Btn><Btn onClick={save} full>{em?"Save":"Add Member"}</Btn></div>
    </div></Sheet>);
  }

  const delT=(id)=>{saveT(teams.filter(t=>t.id!==id));if(sel===id)setSel(teams.find(t=>t.id!==id)?.id||null);setCT(null);};
  const delM=(id)=>{saveM(members.filter(m=>m.id!==id));saveT(teams.map(t=>t.leader===id?{...t,leader:null}:t));setCM(null);};

  return(<div style={{display:"flex",flexDirection:"column",gap:14}}>
    <CompanySwitcher companies={companies} selCompany={selCompany} setSelCompany={setSelCompany}/>
    <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
      {visibleTeams.map(t=><button key={t.id} className="tap" onClick={()=>setSel(t.id)} style={{flexShrink:0,padding:"8px 14px",borderRadius:20,border:"1.5px solid "+(sel===t.id?t.color+"66":C.border),background:sel===t.id?t.color+"15":C.bg1,color:sel===t.id?t.color:C.muted,fontWeight:600,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>{t.name}</button>)}
      <button className="tap" onClick={()=>setTs("new")} style={{flexShrink:0,padding:"8px 14px",borderRadius:20,border:"1.5px dashed "+C.border,background:"transparent",color:C.muted,fontSize:13,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}><Icon name="plus" size={13}/>New Team</button>
    </div>
    {team&&<>
      <div style={{background:C.bg1,border:"1px solid "+C.border,borderRadius:13,overflow:"hidden"}}>
        <div style={{padding:"13px 15px"}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:18,color:team.color}}>{team.name}</div>
          {team.leader&&(()=>{const l=members.find(m=>m.id===team.leader);return l?<div style={{fontSize:13,color:C.muted,marginTop:2}}>Leader: <strong style={{color:C.heading}}>{l.name}</strong></div>:null;})()}
          <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>{projects.filter(p=>p.teamId===sel).map(p=><Pill key={p.id} color={team.color} bg={team.color+"15"} small>{p.projectNumber}</Pill>)}</div>
        </div>
        <div style={{display:"flex",borderTop:"1px solid "+C.border}}>
          <button className="tap" onClick={()=>setTs(team)} style={{flex:1,padding:"10px",background:"transparent",border:"none",color:C.muted,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,fontSize:13}}><Icon name="edit" size={14}/>Edit</button>
          <button className="tap" onClick={()=>setCT(team.id)} style={{flex:1,padding:"10px",background:"transparent",border:"none",borderLeft:"1px solid "+C.border,color:C.red,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,fontSize:13}}><Icon name="trash" size={14}/>Delete</button>

// ── USERS VIEW ────────────────────────────────────────────────────────────────
function UsersView({members,teams,companies,users,setUsers}){
  const DEFAULT_PW="DE2026!!";

  const [eu,setEu]=useState(null);
  const [form,setForm]=useState({name:"",email:"",password:DEFAULT_PW,memberId:"",role:"member",companyId:""});

  const [sending,setSending]=useState(false);
  const [sendStatus,setSendStatus]=useState(null);
  const [showSettings,setShowSettings]=useState(false);

  const [search,setSearch]=useState("");
  const [letterFilter,setLetterFilter]=useState("");
  const LETTERS="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  const filteredUsers=users.filter(u=>{
    const name=(u.name||u.email||"").toLowerCase();
    const email=(u.email||"").toLowerCase();

    const matchSearch=!q||(name.includes(q)||email.includes(q));

    const lastName=(u.name||"").trim().split(" ").pop().toUpperCase();

    return matchSearch&&matchLetter;

// ── MONTH CALENDAR — project due dates by month ───────────────────────────────
function MonthCalendar({projects,tasks,onSelectProject,companies,selCompany,setSelCompany}){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());

  // Filter by company if switcher is present
  const visProjects=companies&&selCompany&&selCompany!=="all"
    ?projects.filter(p=>p.companyId===selCompany)
    :projects;
  const visTasks=companies&&selCompany&&selCompany!=="all"
    ?tasks.filter(t=>{const p=projects.find(x=>x.id===t.projectId);return p&&p.companyId===selCompany;})
    :tasks;

  const prev=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const next=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};

  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dayNames=["Su","Mo","Tu","We","Th","Fr","Sa"];

  // Build calendar grid
  const firstDay=new Date(year,month,1).getDay(); // 0=Sun
  const daysInMonth=new Date(year,month+1,0).getDate();
  const cells=[]; // array of {day, projects}
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  // Map projects to their due day in this month
  const projByDay={};
  visProjects.filter(p=>p.dueDate&&p.projectStatus!=="done").forEach(p=>{
    const dt=new Date(p.dueDate);
    if(dt.getFullYear()===year&&dt.getMonth()===month){
      const d=dt.getDate();
      if(!projByDay[d])projByDay[d]=[];
      projByDay[d].push(p);
    }
  });

  // Tasks due this month (for the list below calendar)
  const tasksByDay={};
  visTasks.filter(t=>t.dueDate&&t.status!=="done").forEach(t=>{
    const dt=new Date(t.dueDate);
    if(dt.getFullYear()===year&&dt.getMonth()===month){
      const d=dt.getDate();
      if(!tasksByDay[d])tasksByDay[d]=[];
      tasksByDay[d].push(t);
    }
  });

  const todayD=today.getFullYear()===year&&today.getMonth()===month?today.getDate():null;

  // Get weeks of cells (rows of 7)
  const weeks=[];
  for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));

  // Days that have anything
  const activeDays=[...new Set([...Object.keys(projByDay),...Object.keys(tasksByDay)].map(Number))].sort((a,b)=>a-b);

  return(<div style={{display:"flex",flexDirection:"column",gap:14}}>
    {/* Company filter — only shown when companies prop is provided */}
    {companies&&companies.length>0&&<CompanySwitcher companies={companies} selCompany={selCompany||"all"} setSelCompany={setSelCompany}/>}
    {/* Month nav */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 4px"}}>
      <button className="tap" onClick={prev} style={{background:C.bgInput,border:"1px solid "+C.border,borderRadius:8,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,cursor:"pointer"}}><Icon name="back" size={16}/></button>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:20,color:C.heading,letterSpacing:1}}>{monthNames[month]}</div>

              {projs.slice(0,2).map(p=>{
                const overdue=new Date(p.dueDate)<today;

                  style={{fontSize:9,lineHeight:1.3,padding:"1px 3px",marginBottom:1,borderRadius:3,background:overdue?"rgba(224,90,78,0.15)":C.gold+"18",color:overdue?C.red:C.gold,cursor:"pointer",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:600}}>
                  {label}
                </div>);
              })}
              {/* Task chips — show up to 2 task names */}
              {tks.slice(0,projs.length>=2?0:2-projs.length).map(t=>{
                const overdue=new Date(t.dueDate)<today;
                const label=t.title.length>14?t.title.slice(0,13)+"…":t.title;
                return(<div key={t.id}
                  style={{fontSize:9,lineHeight:1.3,padding:"1px 3px",marginBottom:1,borderRadius:3,background:overdue?"rgba(224,90,78,0.12)":"rgba(74,158,202,0.12)",color:overdue?C.red:C.blue,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {label}
                </div>);

            </div>);
          })}
        </div>
      ))}
    </div>

    {/* Monthly agenda list — all due items this month */}
    {activeDays.length>0&&(<div style={{display:"flex",flexDirection:"column",gap:8}}>
      <div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.muted,fontFamily:"'Barlow Condensed',sans-serif",paddingLeft:2}}>Due this month</div>

        return(<div key={d} style={{background:C.bg1,border:"1px solid "+(isPast?C.red+"33":C.border),borderRadius:11,overflow:"hidden"}}>
          <div style={{padding:"8px 12px",borderBottom:"1px solid "+C.border2,display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:isPast?C.red:d===todayD?C.gold:C.muted,flexShrink:0}}/>

            <div style={{width:8,height:8,borderRadius:2,background:C.gold,flexShrink:0}}/>
            <ProjNum num={p.projectNumber}/>
            <span style={{flex:1,fontSize:13,fontWeight:600,color:C.heading,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span>
            <Pill color={PROJ_STATUS[p.projectStatus||"construction"].color} bg={PROJ_STATUS[p.projectStatus||"construction"].bg} small>{PROJ_STATUS[p.projectStatus||"construction"].label}</Pill>
          </div>)}
          {dt.map(t=>{const proj=projects.find(p=>p.id===t.projectId);return(<div key={t.id} style={{display:"flex",alignItems:"center",gap:9,padding:"7px 12px",borderBottom:"1px solid "+C.border2}}>
            <div style={{width:8,height:8,borderRadius:"50%",border:"1.5px solid "+C.blue,flexShrink:0}}/>
            {proj&&<span style={{fontSize:10,color:C.dim,flexShrink:0}}>{proj.projectNumber}</span>}
            <span style={{flex:1,fontSize:12,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
          </div>);})}
        </div>);
      })}
    </div>)}
    {activeDays.length===0&&<div style={{textAlign:"center",color:C.dim,padding:"24px 0",fontSize:13}}>No projects or tasks due in {monthNames[month]}</div>}
  </div>);
}

// ── CIVIL VIEW — combined Projects + Task List tab ────────────────────────────

  // Show members filtered by company, sorted by name
  const visible=(selCompany==="all"?members:members.filter(m=>m.companyId===selCompany))
    .sort((a,b)=>a.name.localeCompare(b.name));
  if(!visible.length)return null;
  return(
    <div style={{marginBottom:12}}>
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:4}}>
        <div style={{display:"flex",gap:10,alignItems:"flex-start",padding:"2px 0",minWidth:"max-content"}}>
          {visible.map(m=>{
            const active=selMemberId===m.id;
            const mt=teams.find(t=>t.id===m.teamId);
            const col=mt?mt.color:C.blue;
            return(
              <button key={m.id} className="tap" onClick={()=>onSelect(active?null:m.id)}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,background:"none",border:"none",cursor:"pointer",padding:"4px 2px",minWidth:52}}>
                <div style={{position:"relative"}}>
                  <div style={{width:42,height:42,borderRadius:"50%",
                    border:"2.5px solid "+(active?col:C.border),
                    background:active?col+"22":C.bg2,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    transition:"all 0.15s"}}>
                    <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,color:active?col:C.muted}}>{m.avatar}</span>
                  </div>
                  {active&&<div style={{position:"absolute",bottom:-1,right:-1,width:12,height:12,borderRadius:"50%",background:col,border:"2px solid "+C.bg0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:7,color:"#fff",fontWeight:700}}>✓</span></div>}
                </div>
                <span style={{fontSize:9,fontWeight:active?700:400,color:active?col:C.muted,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:0.3,textAlign:"center",maxWidth:50,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.2}}>{m.name.split(" ")[0]}</span>

function MemberSummaryBar({memberId,members,teams,projects,tasks,companies}){
  const m=members.find(x=>x.id===memberId);
  if(!m)return null;
  const mt=teams.find(t=>t.id===m.teamId);
  const co=companies.find(c=>c.id===m.companyId);
  const col=mt?mt.color:C.blue;
  const myTasks=tasks.filter(t=>(t.assigneeIds||[t.assigneeId]).includes(memberId));
  const open=myTasks.filter(t=>t.status!=="done").length;
  const inprog=myTasks.filter(t=>t.status==="inprogress").length;
  const od=myTasks.filter(t=>isOverdue(t)).length;
  const done=myTasks.filter(t=>t.status==="done").length;
  const myProjIds=new Set([
    ...projects.filter(p=>(p.teamMemberIds||[]).includes(memberId)||(p.assigneeIds||[]).includes(memberId)).map(p=>p.id),
    ...tasks.filter(t=>(t.assigneeIds||[t.assigneeId]).includes(memberId)).map(t=>t.projectId),
  ]);
  return(
    <div style={{padding:"11px 14px",background:col+"12",border:"1px solid "+col+"33",borderRadius:12,marginBottom:12,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flex:1,minWidth:150}}>

        <div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:15,color:C.heading}}>{m.name}</div>
          <div style={{fontSize:11,color:col,fontWeight:600}}>{m.role}{co?" · "+co.short:""}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
        {[[myProjIds.size,"Projects",C.blue],[open,"Open",C.gold],[inprog,"Active",C.green],[od,"Overdue",C.red]].map(([v,lbl,c2])=>(
          <div key={lbl} style={{textAlign:"center"}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,color:c2,lineHeight:1}}>{v}</div>

          </div>
