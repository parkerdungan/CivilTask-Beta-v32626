  );
}

function CivilView({projects,tasks,members,teams,companies,selCompany,setSelCompany,session,canEdit,onSelectProject,onAddProject,onDelProject,onUpdateTask,batchUpTask,onAddTask,onDelTask,onUpdateProject}){
  const [sub,setSub]=useState("projects");
  const [selMember,setSelMember]=useState(null);

  // When a member is selected, scope projects and tasks to them
  const scopedProjects=React.useMemo(()=>{
    if(!selMember)return projects;
    const ids=new Set([
      ...projects.filter(p=>(p.teamMemberIds||[]).includes(selMember)||(p.assigneeIds||[]).includes(selMember)).map(p=>p.id),
      ...tasks.filter(t=>(t.assigneeIds||[t.assigneeId]).includes(selMember)).map(t=>t.projectId),
    ]);
    return projects.filter(p=>ids.has(p.id));
  },[projects,tasks,selMember]);

  const scopedTasks=React.useMemo(()=>{
    if(!selMember)return tasks;
    return tasks.filter(t=>(t.assigneeIds||[t.assigneeId]).includes(selMember));
  },[tasks,selMember]);

  return(<div style={{display:"flex",flexDirection:"column",gap:0}}>
    {/* Sub-tab bar */}
    <div style={{display:"flex",gap:0,background:C.bg1,borderRadius:10,border:"1px solid "+C.border,padding:3,marginBottom:14}}>
      {[["projects","layers","Projects"],["tasks","sched","Task List"],["calendar","cal","Calendar"]].map(([id,ic,lbl])=>(
        <button key={id} className="tap" onClick={()=>setSub(id)}
          style={{flex:1,padding:"8px 10px",borderRadius:8,border:"none",background:sub===id?C.bgInput:"transparent",color:sub===id?C.gold:C.muted,cursor:"pointer",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:5,transition:"all 0.15s"}}>
          <Icon name={ic} size={14}/>{lbl}
        </button>
      ))}
    </div>

    {/* Member rail — always visible in projects & tasks sub-tabs */}
    {sub!=="calendar"&&<MemberRail members={members} teams={teams} companies={companies} selCompany={selCompany} selMemberId={selMember} onSelect={setSelMember}/>}

    {/* Member summary bar — shown when a member is selected */}
    {selMember&&sub!=="calendar"&&<MemberSummaryBar memberId={selMember} members={members} teams={teams} projects={projects} tasks={tasks} companies={companies}/>}

    {/* Active filter badge */}
    {selMember&&sub!=="calendar"&&(()=>{
      const m=members.find(x=>x.id===selMember);
      return m?<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,padding:"5px 10px",background:C.bgTrack,borderRadius:8}}>
        <span style={{fontSize:12,color:C.muted}}>Showing {sub==="projects"?scopedProjects.length+" projects":scopedTasks.length+" tasks"} for <strong style={{color:C.text}}>{m.name}</strong></span>
        <button className="tap" onClick={()=>setSelMember(null)} style={{background:"none",border:"none",color:C.dim,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:3}}>✕ Clear</button>
      </div>:null;
    })()}

    {sub==="projects"&&<ProjectListView
      projects={scopedProjects} tasks={tasks} members={members} teams={teams}
      companies={companies} selCompany={selCompany} setSelCompany={setSelCompany}
      onSelectProject={onSelectProject}
      onAddProject={onAddProject}
      onDelProject={onDelProject}
      onUpdateTask={onUpdateTask}
      onAddTask={onAddTask}
      onUpdateProject={onUpdateProject}
      canEdit={canEdit}/>}
    {sub==="tasks"&&<TaskListView
      tasks={scopedTasks} projects={projects} members={members} teams={teams}
      companies={companies} selCompany={selCompany} setSelCompany={setSelCompany}
      session={session}
      onUpdateTask={onUpdateTask} batchUpTask={batchUpTask}/>}
    {sub==="calendar"&&<MonthCalendar projects={projects} tasks={tasks} onSelectProject={id=>{onSelectProject(id);}} companies={companies} selCompany={selCompany} setSelCompany={setSelCompany}/>}
  </div>);
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  // ── Theme ────────────────────────────────────────────────────────────
  const _initTheme=(()=>{const k=localStorage.getItem("ct:theme")||"dark";Object.assign(C,THEMES[k]);if(k==="light")document.documentElement.classList.add("light");else document.documentElement.classList.remove("light");return k==="dark";})();
  const [isDark,setIsDark]=React.useState(_initTheme);
  // ── Permission helpers ───────────────────────────────────────────────────
  // isAdmin  : can see/edit everything across all firms
  // isLeader : can see/edit everything on their own team
  // isMember : can only see items they are assigned to
  const FONT_SIZES=["XS","SM","MD","LG","XL","2XL"];
  const FONT_ZOOMS=[0.78,0.88,1.0,1.12,1.24,1.38];
  const FONT_NAMES=["Extra Small","Small","Medium","Large","Extra Large","XX Large"];
  const _initSize=(()=>{return parseInt(localStorage.getItem("ct:fontsize")||"2");})();
  const [fontSize,setFontSize]=React.useState(_initSize);
  const cycleFontSize=()=>{const next=(fontSize+1)%FONT_SIZES.length;localStorage.setItem("ct:fontsize",String(next));setFontSize(next);};
  const setFontSizeIdx=(i)=>{localStorage.setItem("ct:fontsize",String(i));setFontSize(i);};
  const appScale=FONT_ZOOMS[fontSize]||1.0;
  const toggleTheme=()=>{
    const next=!isDark;const key=next?"dark":"light";
    localStorage.setItem("ct:theme",key);
    document.documentElement.classList.toggle("light",!next);
    Object.assign(C,THEMES[key]);
    setIsDark(next);
  };
  const [session,setSession]=useState(null);const [booting,setBooting]=useState(true);const [tab,setTab]=useState("home");
  const [selProjId,setSelProjId]=useState(null);const [detailMode,setDetailMode]=useState(false);
  const [companies,setCompanies]=useState([]);
  const [teams,setTeams]=useState([]);const [projects,setProjects]=useState([]);const [tasks,setTasks]=useState([]);
  const [members,setMembers]=useState([]);const [users,setUsers]=useState([]);const [showProf,setShowProf]=useState(false);
  const [selCompany,setSelCompany]=useState("all"); // "all" or a companyId

  useEffect(()=>{
    const s=LS.get(SK.session);if(s)setSession(s);
    let co=LS.get(SK.companies);if(!co){co=SEED_COMPANIES;}setCompanies(co);
    let tm=LS.get(SK.teams);if(!tm){tm=SEED_TEAMS;}setTeams(tm);
    let u=LS.get(SK.users);if(!u){u=SEED_USERS;}setUsers(u);
    let m=LS.get(SK.members);if(!m){m=SEED_MEMBERS;}setMembers(m);
    let p=LS.get(SK.projects);if(!p){p=SEED_PROJECTS;}setProjects(p);
    let t=LS.get(SK.tasks);if(!t){t=SEED_TASKS||[];}setTasks(t);
    setBooting(false);
    const uns=[];
    uns.push(window.fbOn("companies",v=>{if(!v||!Array.isArray(v)||v.length<SEED_COMPANIES.length){window.fbSet("companies",SEED_COMPANIES);setCompanies(SEED_COMPANIES);}else{setCompanies(v);LS.set(SK.companies,v);}}));
    uns.push(window.fbOn("teams",v=>{if(!v||!Array.isArray(v)||v.length<SEED_TEAMS.length){window.fbSet("teams",SEED_TEAMS);setTeams(SEED_TEAMS);}else{setTeams(v);LS.set(SK.teams,v);}}));
    uns.push(window.fbOn("users",v=>{if(!v||!Array.isArray(v)||v.length<SEED_USERS.length){window.fbSet("users",SEED_USERS);setUsers(SEED_USERS);}else{setUsers(v);LS.set(SK.users,v);}}));
    uns.push(window.fbOn("members",v=>{if(!v||!Array.isArray(v)||v.length<SEED_MEMBERS.length){window.fbSet("members",SEED_MEMBERS);setMembers(SEED_MEMBERS);}else{setMembers(v);LS.set(SK.members,v);}}));
    uns.push(window.fbOn("projects",v=>{if(!v||!Array.isArray(v)||v.length<SEED_PROJECTS.length){window.fbSet("projects",SEED_PROJECTS);setProjects(SEED_PROJECTS);}else{setProjects(v);LS.set(SK.projects,v);}}));
    uns.push(window.fbOn("tasks",v=>{const td=v&&Array.isArray(v)?v:(SEED_TASKS||[]);setTasks(td);LS.set(SK.tasks,td);}));
    return()=>uns.forEach(u=>u&&u());
  },[]);

  const logout=()=>{LS.del(SK.session);setSession(null);};
  const saveP=(p)=>{setProjects(p);LS.set(SK.projects,p);window.fbSet('projects',p);};
  const saveT=(t)=>{setTasks(t);LS.set(SK.tasks,t);window.fbSet('tasks',t);};
  const upTask=(u)=>saveT(tasks.map(t=>t.id===u.id?u:t));
  const batchUpTask=(updates)=>{const map={};updates.forEach(u=>{map[u.id]=u;});saveT(tasks.map(t=>map[t.id]?{...t,...map[t.id]}:t));};

  const isAdmin=session&&session.role==="admin";
  const isLeader=session&&session.role==="leader";
  const isMember=session&&session.role==="member";
  const hasEditAccess=session&&(isAdmin||isLeader||session.canEditOverride===true);
  const myMember=session&&members.find(m=>m.id===session.memberId);
  const myTeamId=myMember?myMember.teamId:null;
  const myCompanyId=session&&session.companyId;

  // Scope visible projects by role
  const visibleProjects=React.useMemo(()=>{
    if(isAdmin)return projects;
    if(isLeader){
      // Leaders see all projects in their company
      return projects.filter(p=>p.companyId===myCompanyId);
    }
    // Members see projects they are assigned to (as team member or task assignee)
    const assignedProjIds=new Set([
      ...projects.filter(p=>(p.teamMemberIds||[]).includes(session&&session.memberId)||(p.assigneeIds||[]).includes(session&&session.memberId)).map(p=>p.id),
      ...tasks.filter(t=>(t.assigneeIds||[t.assigneeId]).includes(session&&session.memberId)).map(t=>t.projectId),
    ]);
    return projects.filter(p=>assignedProjIds.has(p.id));
  },[projects,tasks,session,isAdmin,isLeader,myCompanyId]);

  // Scope visible tasks by role
  const visibleTasks=React.useMemo(()=>{
    if(isAdmin)return tasks;
    if(isLeader)return tasks.filter(t=>{const p=projects.find(x=>x.id===t.projectId);return p&&p.companyId===myCompanyId;});
    return tasks.filter(t=>(t.assigneeIds||[t.assigneeId]).includes(session&&session.memberId)||(t.subtasks||[]).some(s=>(s.assigneeIds||[]).includes(session&&session.memberId)));
  },[tasks,projects,session,isAdmin,isLeader,myCompanyId]);

  // Scope visible members by role
  const visibleMembers=React.useMemo(()=>{
    if(isAdmin)return members;
    if(isLeader)return members.filter(m=>m.companyId===myCompanyId);
    return members.filter(m=>m.companyId===myCompanyId);
  },[members,session,isAdmin,isLeader,myCompanyId]);
  const selProj=projects.find(p=>p.id===selProjId);

  const navTabs=[
    {id:"home",    label:"Overview",icon:"home"},
    {id:"civil",   label:"Civil",   icon:"layers"},
    {id:"teams",   label:"Teams",   icon:"users"},
    ...(isAdmin?[{id:"accounts",label:"Accounts",icon:"shield"}]:[]),
  ];

  if(booting)return <div style={{height:"100vh",background:C.bg0,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Barlow Condensed',sans-serif",color:C.muted,letterSpacing:3,textTransform:"uppercase",fontSize:14}}>Loading…</div>;
  if(!session)return <LoginScreen onLogin={setSession}/>;

  const pageTitle=()=>{if(detailMode&&selProj)return selProj.name;const co=companies.find(c=>c.id===selCompany);const suffix=co?" · "+co.short:"";const base={home:"Overview",civil:"Civil",survey:"Survey",teams:"Teams",accounts:"Accounts"}[tab]||"";return base+suffix;};

  const main=()=>{
    if(detailMode&&selProj)return <ProjectDetailView project={selProj} tasks={visibleTasks} members={visibleMembers} teams={teams} companies={companies} projects={visibleProjects} canEdit={hasEditAccess} onBack={()=>{setDetailMode(false);setSelProjId(null);}} onUpdateTask={upTask} onAddTask={t=>saveT([...tasks,t])} onDelTask={id=>saveT(tasks.filter(t=>t.id!==id))} onUpdateProject={p=>saveP(projects.map(x=>x.id===p.id?p:x))}/>;
    if(tab==="home")     return <DashboardView projects={visibleProjects} tasks={visibleTasks} members={visibleMembers} teams={teams} companies={companies} selCompany={selCompany} setSelCompany={setSelCompany} session={session} onSelectProject={id=>{setSelProjId(id);setDetailMode(true);setTab("civil");}} onAddTask={t=>saveT([...tasks,t])} onUpdateTask={upTask}/>;
    if(tab==="civil")    return <CivilView projects={visibleProjects} tasks={visibleTasks} members={visibleMembers} teams={teams} companies={companies} selCompany={selCompany} setSelCompany={setSelCompany} session={session} canEdit={hasEditAccess} onUpdateProject={p=>saveP(projects.map(x=>x.id===p.id?p:x))} onSelectProject={id=>{setSelProjId(id);setDetailMode(true);}} onAddProject={p=>saveP([...projects,p])} onDelProject={id=>{saveP(projects.filter(p=>p.id!==id));saveT(tasks.filter(t=>t.projectId!==id));}} onUpdateTask={upTask} batchUpTask={batchUpTask} onAddTask={t=>saveT([...tasks,t])} onDelTask={id=>saveT(tasks.filter(t=>t.id!==id))}/>;
    if(tab==="teams")    return <TeamsView teams={teams} members={visibleMembers} tasks={visibleTasks} projects={visibleProjects} companies={companies} selCompany={selCompany} setSelCompany={setSelCompany} setTeams={setTeams} setMembers={setMembers}/>;
    if(tab==="accounts"&&isAdmin) return <UsersView members={members} teams={teams} companies={companies} users={users} setUsers={setUsers}/>;
    return null;
  };

  return(
    <div style={{width:"100vw",height:"100vh",overflow:"hidden",background:C.bg0}}>
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:C.bg0,transform:"scale("+appScale+")",transformOrigin:"top left",width:(100/appScale)+"%",height:(100/appScale)+"vh"}}>
    <div style={{height:"env(safe-area-inset-top)",background:C.bg1,flexShrink:0}}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:C.bg1,borderBottom:"1px solid "+C.border,flexShrink:0,minHeight:58}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {detailMode&&<button className="tap" onClick={()=>{setDetailMode(false);setSelProjId(null);}} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",padding:"4px 0",display:"flex",alignItems:"center"}}><Icon name="back" size={22}/></button>}
        {!detailMode
          ?<CiviltechLogo textColor={isDark?"#d4e8f8":"#1a2e42"} accentColor={isDark?"#e8a020":"#b06808"} height={34}/>
          :<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:20,color:C.heading,letterSpacing:0.5,lineHeight:1.2}}>{pageTitle()}</div>
        }
      </div>
      {detailMode&&<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,color:C.dim,letterSpacing:0.5}}>{pageTitle()}</div>}
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button className="tap" title="Download backup" onClick={()=>{
          const data={version:"ct-export-v1",exportedAt:new Date().toISOString(),companies:LS.get(SK.companies)||[],teams:LS.get(SK.teams)||[],members:LS.get(SK.members)||[],users:LS.get(SK.users)||[],projects:LS.get(SK.projects)||[],tasks:LS.get(SK.tasks)||[]};
          const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
          const url=URL.createObjectURL(blob);const a=document.createElement("a");
          const date=new Date().toISOString().slice(0,10);
          a.href=url;a.download=`CivilTech_backup_${date}.json`;a.click();URL.revokeObjectURL(url);
        }} style={{display:"flex",alignItems:"center",justifyContent:"center",width:36,height:36,borderRadius:"50%",background:C.bgInput,border:"1px solid "+C.border2,cursor:"pointer",color:C.muted}}>
          <Icon name="dl" size={16}/>
        </button>
        <button className="tap" onClick={()=>setShowProf(true)} style={{background:"none",border:"none",cursor:"pointer",padding:2}}><Av initials={session.name[0].toUpperCase()} color={isAdmin?C.gold:session.role==="leader"?C.green:C.blue} size={38}/></button>
      </div>
    </div>
    <div className="fade-in" style={{flex:1,overflowY:"auto",padding:"13px 13px 0",WebkitOverflowScrolling:"touch"}}>{main()}<div style={{height:24}}/></div>
    {!detailMode&&<div style={{background:C.bg1,borderTop:"1px solid "+C.border,paddingBottom:"env(safe-area-inset-bottom)",flexShrink:0}}>
      <div style={{display:"flex"}}>{navTabs.map(t=>{const active=tab===t.id;return(<button key={t.id} className="tap" onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 4px 8px",background:"transparent",border:"none",color:active?C.gold:C.muted,cursor:"pointer",transition:"color 0.15s"}}>
        <Icon name={t.icon} size={22}/><span style={{fontSize:10,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:0.8,textTransform:"uppercase"}}>{t.label}</span>{active&&<div style={{width:4,height:4,borderRadius:"50%",background:C.gold,marginTop:-2}}/>}
      </button>);})}</div>
    </div>}
    {showProf&&<Sheet title="My Account" onClose={()=>setShowProf(false)}><div style={{display:"flex",flexDirection:"column",gap:15}}>
      {/* User info */}
      <div style={{display:"flex",alignItems:"center",gap:13,padding:"4px 0 14px",borderBottom:"1px solid "+C.border}}><Av initials={session.name[0].toUpperCase()} color={isAdmin?C.gold:C.blue} size={54}/><div><div style={{fontSize:17,fontWeight:600,color:C.heading}}>{session.name}</div><div style={{fontSize:13,color:C.muted,marginTop:2}}>{session.email}</div><div style={{marginTop:5}}>{isAdmin?<Pill color={C.gold} bg="rgba(232,160,32,0.12)"><Icon name="shield" size={9}/>Administrator</Pill>:session.role==="leader"?<Pill color={C.green} bg="rgba(106,196,122,0.12)"><Icon name="users" size={9}/>Team Leader</Pill>:session.canEditOverride?<Pill color={C.green} bg="rgba(106,196,122,0.1)">✏️ Member + Edit</Pill>:<Pill color={C.blue} bg="rgba(74,158,202,0.1)">Member</Pill>}</div></div></div>

      {/* Data backup / restore — admin only */}
      {isAdmin&&<div style={{background:C.bg0,borderRadius:11,border:"1px solid "+C.border2,overflow:"hidden"}}>
        <div style={{fontSize:11,letterSpacing:2,color:C.dim,textTransform:"uppercase",padding:"11px 14px 8px",fontFamily:"'Barlow Condensed',sans-serif",borderBottom:"1px solid "+C.border2}}>Data Backup & Restore</div>
        <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:10}}>
          {/* Export */}
          <button className="tap" onClick={()=>{
            const snapshot={
              version:"ct-export-v1",
              exportedAt:new Date().toISOString(),
              companies:LS.get(SK.companies)||[],
              teams:LS.get(SK.teams)||[],
              members:LS.get(SK.members)||[],
              users:LS.get(SK.users)||[],
              projects:LS.get(SK.projects)||[],
              tasks:LS.get(SK.tasks)||[],
            };
            const blob=new Blob([JSON.stringify(snapshot,null,2)],{type:"application/json"});
            const url=URL.createObjectURL(blob);
            const a=document.createElement("a");
            const date=new Date().toISOString().slice(0,10);
            a.href=url;a.download=`CivilTech_backup_${date}.json`;a.click();
            URL.revokeObjectURL(url);
          }} style={{display:"flex",alignItems:"center",gap:9,padding:"11px 14px",background:"rgba(106,196,122,0.08)",border:"1px solid rgba(106,196,122,0.3)",borderRadius:10,color:C.green,cursor:"pointer",fontSize:13,fontWeight:600,textAlign:"left",width:"100%"}}>
            <Icon name="check" size={16}/>
            <div>
              <div>Export Backup</div>
              <div style={{fontSize:11,color:C.muted,fontWeight:400,marginTop:1}}>Download all data as a JSON file</div>
            </div>
          </button>
          {/* Import */}
          <button className="tap" onClick={()=>{
            const input=document.createElement("input");
            input.type="file";input.accept=".json";
            input.onchange=e=>{
              const file=e.target.files[0];if(!file)return;
              const reader=new FileReader();
              reader.onload=ev=>{
                try{
                  const data=JSON.parse(ev.target.result);
                  if(data.version!=="ct-export-v1"){alert("Unrecognised backup file.");return;}
                  if(!window.confirm(`Restore backup from ${data.exportedAt?.slice(0,10)||"unknown date"}?\n\nThis will REPLACE all current data.`))return;
                  if(data.companies)window.fbSet('companies',data.companies);
                  if(data.teams)window.fbSet('teams',data.teams);
                  if(data.members)window.fbSet('members',data.members);
                  if(data.users)window.fbSet('users',data.users);
                  if(data.projects)window.fbSet('projects',data.projects);
                  if(data.tasks)window.fbSet('tasks',data.tasks);
                  // Keep current version so it doesn't wipe on reload
                  LS.set(SK.ver,DATA_VERSION);
                  window.location.reload();
                }catch(err){alert("Could not read backup file. Make sure it's a valid CivilTech JSON export.");}
              };
              reader.readAsText(file);
            };
            input.click();
          }} style={{display:"flex",alignItems:"center",gap:9,padding:"11px 14px",background:"rgba(74,158,202,0.08)",border:"1px solid rgba(74,158,202,0.3)",borderRadius:10,color:C.blue,cursor:"pointer",fontSize:13,fontWeight:600,textAlign:"left",width:"100%"}}>
            <Icon name="layers" size={16}/>
            <div>
              <div>Restore from Backup</div>
              <div style={{fontSize:11,color:C.muted,fontWeight:400,marginTop:1}}>Load a previously exported JSON file</div>
            </div>
          </button>
        </div>
      </div>}

      {/* Install instructions */}
      {/* Theme + font size toggles */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <button className="tap" onClick={toggleTheme} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:C.bg0,border:"1px solid "+C.border2,borderRadius:11,cursor:"pointer",width:"100%"}}>
          <div><div style={{fontSize:13,fontWeight:600,color:C.text,textAlign:"left"}}>{isDark?"🌙 Dark Mode":"☀️ Light Mode"}</div><div style={{fontSize:11,color:C.muted,marginTop:2,textAlign:"left"}}>Tap to switch to {isDark?"light":"dark"} theme</div></div>
          <div style={{width:44,height:24,borderRadius:12,background:isDark?"#1e3248":"#c4d4e8",position:"relative",flexShrink:0,transition:"background 0.2s"}}><div style={{position:"absolute",top:3,left:isDark?20:3,width:18,height:18,borderRadius:"50%",background:isDark?C.blue:C.gold,transition:"left 0.2s,background 0.2s"}}/></div>
        </button>
        <div style={{background:C.bg0,border:"1px solid "+C.border2,borderRadius:11,overflow:"hidden"}}>
          <div style={{padding:"11px 14px 8px",borderBottom:"1px solid "+C.border2,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text}}>🔤 Text Size</div>
            <div style={{fontSize:11,color:C.muted}}>{FONT_NAMES[fontSize]}</div>
          </div>
          <div style={{display:"flex",padding:"10px 10px",gap:6}}>
            {FONT_SIZES.map((lbl,i)=><button key={i} className="tap" onClick={()=>setFontSizeIdx(i)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"8px 4px",borderRadius:9,border:"1.5px solid "+(fontSize===i?C.gold:C.border),background:fontSize===i?"rgba(232,160,32,0.1)":"transparent",cursor:"pointer"}}>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:8+i*2,color:fontSize===i?C.gold:C.dim,lineHeight:1,display:"block"}}>{i<3?"a":"A"}</span>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:fontSize===i?700:400,color:fontSize===i?C.gold:C.muted,letterSpacing:0.3}}>{lbl}</span>
            </button>)}
          </div>
        </div>
      </div>
      <div style={{background:C.bg0,borderRadius:11,padding:"12px 13px",border:"1px solid "+C.border2}}><div style={{fontSize:11,letterSpacing:2,color:C.dim,textTransform:"uppercase",marginBottom:7,fontFamily:"'Barlow Condensed',sans-serif"}}>Install on iPhone</div><div style={{fontSize:13,color:C.muted,lineHeight:1.6}}>1. Open in <strong style={{color:C.text}}>Safari</strong><br/>2. Tap the <strong style={{color:C.text}}>Share ↑</strong> button<br/>3. Select <strong style={{color:C.text}}>"Add to Home Screen"</strong></div></div>

      {/* Danger zone */}
      {isAdmin&&<div style={{background:C.bg0,borderRadius:11,border:"1px solid rgba(224,90,78,0.25)",overflow:"hidden"}}>
        <div style={{fontSize:11,letterSpacing:2,color:"rgba(224,90,78,0.7)",textTransform:"uppercase",padding:"11px 14px 8px",fontFamily:"'Barlow Condensed',sans-serif",borderBottom:"1px solid rgba(224,90,78,0.15)"}}>Danger Zone</div>
        <div style={{padding:"12px 14px"}}>
          <Btn onClick={()=>{
            if(!window.confirm("⚠️ This will permanently delete ALL data — projects, tasks, teams, members, and accounts.\n\nThis cannot be undone. Are you sure?"))return;
            [SK.companies,SK.teams,SK.users,SK.members,SK.projects,SK.tasks,SK.ver,SK.emailjs].forEach(k=>LS.del(k));
            LS.del(SK.session);
            window.location.reload();
          }} full danger>🗑 Clear All Data & Reset</Btn>
          <div style={{fontSize:11,color:C.dim,marginTop:8,textAlign:"center"}}>Export a backup first before clearing.</div>
        </div>
      </div>}

      <Btn onClick={()=>{setShowProf(false);logout();}} full danger>Sign Out</Btn>
    </div></Sheet>}
    {/* Floating controls — bottom left */}
    <div style={{position:"fixed",bottom:"calc(74px + env(safe-area-inset-bottom))",left:12,zIndex:120,display:"flex",flexDirection:"column",gap:8}}>
      {/* Font size button — shows popover with 6 options */}
      {React.createElement(()=>{
        const [open,setOpen]=React.useState(false);
        return(<div style={{position:"relative"}}>
          <button className="tap" onClick={()=>setOpen(v=>!v)} style={{width:36,height:36,borderRadius:"50%",background:isDark?"#1e3248":"#dce8f5",border:"1px solid "+(isDark?"#2a4460":"#b8ccdf"),boxShadow:"0 2px 8px rgba(0,0,0,0.22)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexDirection:"column",gap:0,transition:"background 0.2s"}}>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:isDark?"#7aaec8":"#3a6080",lineHeight:1}}>A</span>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:400,fontSize:7,color:isDark?"#4a7090":"#7a9ab8",lineHeight:1,letterSpacing:0.5}}>{FONT_SIZES[fontSize]}</span>
          </button>
          {open&&<div style={{position:"absolute",bottom:"calc(100% + 8px)",left:0,background:isDark?"#0d1e2e":"#ffffff",border:"1px solid "+(isDark?"#1e3248":"#c4d4e8"),borderRadius:12,padding:"8px 6px",boxShadow:"0 4px 20px rgba(0,0,0,0.3)",display:"flex",flexDirection:"column",gap:4,minWidth:88,zIndex:200}}>
            <div style={{fontSize:9,letterSpacing:1.5,textTransform:"uppercase",color:isDark?"#5a8aaa":"#6a8aaa",fontFamily:"'Barlow Condensed',sans-serif",padding:"0 6px 4px",borderBottom:"1px solid "+(isDark?"#1e3248":"#c4d4e8"),marginBottom:2}}>Text Size</div>
            {FONT_SIZES.map((lbl,i)=><button key={i} className="tap" onClick={()=>{setFontSizeIdx(i);setOpen(false);}} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",borderRadius:8,background:fontSize===i?(isDark?"#1e3248":"#dce8f5"):"transparent",border:"none",cursor:"pointer",width:"100%",textAlign:"left"}}>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:9+i*2,color:isDark?"#7aaec8":"#3a6080",minWidth:14,textAlign:"center",lineHeight:1}}>{["a","A","A","A","A","A"][i]}</span>
              <span style={{fontSize:11,fontWeight:fontSize===i?700:400,color:fontSize===i?(isDark?"#d4e8f8":"#1a2e42"):(isDark?"#7aaec8":"#3a6080"),fontFamily:"'Barlow Condensed',sans-serif"}}>{FONT_NAMES[i]}</span>
              {fontSize===i&&<span style={{fontSize:9,color:isDark?"#6ac47a":"#228a40",marginLeft:"auto"}}>✓</span>}
            </button>)}
          </div>}
          {open&&<div style={{position:"fixed",inset:0,zIndex:199}} onClick={()=>setOpen(false)}/>}
        </div>);
      },null)}
      {/* Theme toggle */}
      <button className="tap" onClick={toggleTheme} style={{width:36,height:36,borderRadius:"50%",background:isDark?"#1e3248":"#dce8f5",border:"1px solid "+(isDark?"#2a4460":"#b8ccdf"),boxShadow:"0 2px 8px rgba(0,0,0,0.22)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:17,transition:"background 0.2s,border 0.2s"}}>
        {isDark?"☀️":"🌙"}
      </button>
    </div>
  </div>
  </div>);
}
const _splash=document.getElementById("ct-splash");
if(_splash){_splash.style.transition="opacity 0.3s";_splash.style.opacity="0";setTimeout(()=>_splash.remove(),350);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
